<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARTEMIS ALPHA · Investment Decision Audit</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════ */
/* DESIGN SYSTEM — Terminal Luxe               */
/* ═══════════════════════════════════════════ */
:root {
  --bg-0: #060f0a;
  --bg-1: #0a1910;
  --bg-2: #112618;
  --bg-3: #1a3524;
  --border: #1e442e;
  --border-light: #265538;
  --text-0: #f0f4fc;
  --text-1: #c4cedf;
  --text-2: #7b8ba8;
  --text-3: #4a5874;
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.12);
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.12);
  --red: #ff5252;
  --red-dim: rgba(255,82,82,0.12);
  --amber: #ffab00;
  --amber-dim: rgba(255,171,0,0.12);
  --purple: #b388ff;
  --purple-dim: rgba(179,136,255,0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --shadow: 0 2px 20px rgba(0,0,0,0.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-mono);
  background: var(--bg-0);
  color: var(--text-1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* ═══════ LAYOUT ═══════ */
.app { max-width: 860px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 1; }

/* ═══════ HEADER ═══════ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo {
  font-size: 30px; color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,229,255,0.4);
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%, 100% { text-shadow: 0 0 20px rgba(0,229,255,0.4); }
  50% { text-shadow: 0 0 30px rgba(0,229,255,0.6), 0 0 60px rgba(0,229,255,0.2); }
}
.header-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 800;
  letter-spacing: 4px; color: var(--text-0);
}
.header-sub {
  font-size: 9px; color: var(--text-3);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.export-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); padding: 7px 16px; border-radius: var(--radius-sm);
  cursor: pointer; font-family: var(--font-mono); font-size: 12px;
  transition: var(--transition);
}
.export-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* ═══════ NAV ═══════ */
.nav {
  display: flex; gap: 4px; padding: 14px 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav::-webkit-scrollbar { display: none; }
.nav-tab {
  display: flex; align-items: center; gap: 7px;
  background: transparent; border: none; color: var(--text-3);
  padding: 9px 16px; border-radius: var(--radius);
  cursor: pointer; font-family: var(--font-mono); font-size: 13px;
  white-space: nowrap; transition: var(--transition);
}
.nav-tab:hover { color: var(--text-2); background: var(--bg-2); }
.nav-tab.active { background: var(--bg-3); color: var(--cyan); }
.tab-icon { font-size: 15px; }

/* ═══════ MAIN ═══════ */
.main { padding-top: 24px; }

/* ═══════ STATS GRID ═══════ */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-1); border-radius: var(--radius);
  padding: 18px 20px; border-left: 3px solid var(--border);
  transition: var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.stat-label {
  font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 700; margin-top: 6px;
}
.stat-sub { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* ═══════ DASHBOARD ═══════ */
.dash-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media (max-width: 600px) { .dash-row { grid-template-columns: 1fr; } }
.dash-section {
  background: var(--bg-1); border-radius: var(--radius); padding: 18px;
  border: 1px solid var(--border);
}
.dash-title {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 14px;
}
.mini-card { padding: 9px 0; border-bottom: 1px solid var(--border); }
.mini-card:last-child { border-bottom: none; }
.mini-row { display: flex; align-items: center; gap: 10px; }
.mini-date { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* ═══════ MOOD TIMELINE ═══════ */
.mood-timeline { display: flex; flex-direction: column; gap: 10px; }
.mood-dot { display: flex; align-items: center; gap: 10px; }
.mood-emoji { font-size: 22px; }
.mood-label-sm { font-size: 12px; color: var(--text-2); }

/* ═══════ SECTION HEADER ═══════ */
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700; color: var(--text-0);
}
.add-btn {
  background: var(--cyan); color: var(--bg-0); border: none;
  padding: 9px 22px; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; font-size: 13px;
  font-family: var(--font-mono); transition: var(--transition);
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
}
.add-btn:hover { box-shadow: 0 0 30px rgba(0,229,255,0.4); transform: translateY(-1px); }

/* ═══════ FORM CARD ═══════ */
.form-card {
  background: var(--bg-1); border-radius: var(--radius);
  padding: 24px; margin-bottom: 24px;
  border: 1px solid var(--border-light);
  animation: slideDown 0.25s ease-out;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
.form-label {
  display: block; font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
}
.form-input {
  width: 100%; background: var(--bg-0); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px;
  color: var(--text-0); font-size: 14px; font-family: var(--font-mono);
  outline: none; transition: var(--transition);
}
.form-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
.form-textarea {
  width: 100%; background: var(--bg-0); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px;
  color: var(--text-1); font-size: 13px; font-family: var(--font-mono);
  resize: vertical; outline: none; transition: var(--transition);
  line-height: 1.6;
}
.form-textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }

/* ═══════ TOGGLE BUTTONS ═══════ */
.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; }
.toggle-btn {
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-2); padding: 8px 18px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-family: var(--font-mono);
  transition: var(--transition);
}
.toggle-btn:hover { border-color: var(--text-3); }
.toggle-btn.active-long { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.toggle-btn.active-short { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.toggle-btn.active-neutral { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

/* ═══════ MOOD SELECTOR ═══════ */
.mood-selector { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.mood-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--bg-2); border: 2px solid transparent;
  padding: 14px 18px; border-radius: var(--radius);
  cursor: pointer; font-family: var(--font-mono); color: var(--text-2);
  transition: var(--transition);
}
.mood-btn:hover { border-color: var(--border-light); }
.mood-btn.active { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }
.mood-btn .emoji { font-size: 30px; }
.mood-btn .label { font-size: 10px; }

/* ═══════ CONFIDENCE ═══════ */
.conf-row { display: flex; gap: 6px; }
.conf-btn {
  flex: 1; background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-2); padding: 9px 4px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 11px; font-family: var(--font-mono);
  text-align: center; transition: var(--transition);
}
.conf-btn.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }

/* ═══════ RANGE SLIDER ═══════ */
.slider { width: 100%; accent-color: var(--cyan); margin-top: 8px; cursor: pointer; }
.slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-top: 4px; }

/* ═══════ FORM ACTIONS ═══════ */
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.cancel-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); padding: 9px 22px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-family: var(--font-mono);
  transition: var(--transition);
}
.cancel-btn:hover { border-color: var(--text-3); }
.save-btn {
  background: var(--cyan); color: var(--bg-0); border: none;
  padding: 9px 28px; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; font-size: 13px;
  font-family: var(--font-mono); transition: var(--transition);
}
.save-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.3); }

/* ═══════ CARD LIST ═══════ */
.card-list { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--bg-1); border-radius: var(--radius);
  padding: 16px 20px; border: 1px solid var(--border);
  transition: var(--transition);
}
.card:hover { border-color: var(--border-light); }
.card-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.card-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.card-right { display: flex; align-items: center; gap: 8px; }

.ticker {
  font-family: var(--font-display);
  font-weight: 700; font-size: 17px; color: var(--text-0);
  letter-spacing: 1px;
}
.badge {
  font-size: 10px; padding: 3px 10px; border-radius: 4px; font-weight: 500;
  letter-spacing: 0.5px;
}
.badge-long { background: var(--green-dim); color: var(--green); }
.badge-short { background: var(--red-dim); color: var(--red); }
.badge-neutral { background: rgba(123,139,168,0.12); color: var(--text-2); }
.size-badge { font-size: 10px; color: var(--text-3); background: var(--bg-2); padding: 3px 9px; border-radius: 4px; }

.pnl-big {
  font-family: var(--font-display);
  font-weight: 700; font-size: 22px; letter-spacing: 0.5px;
}
.pnl-pos { color: var(--green); }
.pnl-neg { color: var(--red); }

.card-note { font-size: 13px; color: var(--text-2); margin-top: 10px; line-height: 1.6; white-space: pre-wrap; }
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
}
.card-date { font-size: 10px; color: var(--text-3); }
.icon-btn {
  background: transparent; border: none; color: var(--text-3);
  cursor: pointer; font-size: 14px; padding: 4px 8px;
  font-family: var(--font-mono); transition: var(--transition);
}
.icon-btn:hover { color: var(--text-1); }

/* ═══════ PROBABILITY CIRCLE ═══════ */
.prob-circle {
  width: 56px; height: 56px; border-radius: 50%;
  border: 2px solid var(--cyan); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 15px rgba(0,229,255,0.15);
}
.prob-val { font-size: 15px; font-weight: 700; color: var(--cyan); }

.event-text { font-size: 14px; color: var(--text-1); }
.mood-tag { font-size: 14px; font-weight: 600; color: var(--text-0); }
.conf-tag { font-size: 10px; color: var(--purple); background: var(--purple-dim); padding: 3px 9px; border-radius: 4px; }
.time-tag { font-size: 10px; color: var(--text-2); background: var(--bg-2); padding: 3px 9px; border-radius: 4px; }

/* Forecast border states */
.card.correct { border-left: 3px solid var(--green); }
.card.incorrect { border-left: 3px solid var(--red); }
.card.pending { border-left: 3px solid var(--border); }

/* ═══════ EMPTY STATE ═══════ */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-3);
}
.empty-icon { font-size: 52px; display: block; margin-bottom: 16px; opacity: 0.4; }
.empty-hint { font-size: 11px; color: var(--border-light); margin-top: 6px; }

/* ═══════ TOAST ═══════ */
.toast {
  position: fixed; top: 20px; right: 20px;
  background: var(--cyan); color: var(--bg-0);
  padding: 10px 22px; border-radius: var(--radius);
  font-weight: 600; font-size: 13px; z-index: 9999;
  font-family: var(--font-mono);
  box-shadow: 0 4px 30px rgba(0,229,255,0.3);
  animation: toastIn 0.3s ease-out;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px) translateX(10px); }
  to { opacity: 1; transform: translateY(0) translateX(0); }
}

/* ═══════ LOADING ═══════ */
.loading-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100vh;
}
.loading-icon { font-size: 48px; animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-3); font-size: 13px; margin-top: 16px; letter-spacing: 2px; }

/* ═══════ SETUP SCREEN ═══════ */
.setup-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 40px 20px;
}
.setup-card {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px; max-width: 480px; width: 100%;
}
.setup-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700; color: var(--text-0);
  text-align: center; margin-bottom: 8px;
}
.setup-sub { text-align: center; color: var(--text-3); font-size: 12px; margin-bottom: 30px; }
.setup-field { margin-bottom: 18px; }
.setup-help { font-size: 11px; color: var(--text-3); margin-top: 4px; line-height: 1.5; }
.setup-save {
  width: 100%; background: var(--cyan); color: var(--bg-0); border: none;
  padding: 12px; border-radius: var(--radius); cursor: pointer;
  font-weight: 600; font-size: 14px; font-family: var(--font-mono);
  margin-top: 10px; transition: var(--transition);
}
.setup-save:hover { box-shadow: 0 0 30px rgba(0,229,255,0.3); }
.setup-skip {
  display: block; text-align: center; margin-top: 16px;
  color: var(--text-3); font-size: 12px; cursor: pointer;
  background: none; border: none; font-family: var(--font-mono);
}
.setup-skip:hover { color: var(--text-2); }

/* ═══════ MARKET TAB ═══════ */
.market-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.market-bar .form-input { flex: 1; }
.market-bar button { white-space: nowrap; }
.watchlist { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.watchlist-btn {
  background: var(--bg-2); border: 1px solid var(--border); color: var(--text-2);
  padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-mono); font-size: 12px; transition: var(--transition);
}
.watchlist-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.quote-card {
  background: var(--bg-1); border-radius: var(--radius); padding: 24px;
  border: 1px solid var(--border); margin-bottom: 16px;
}
.quote-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.quote-ticker { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--text-0); }
.quote-name { font-size: 12px; color: var(--text-3); }
.quote-price { font-family: var(--font-display); font-size: 36px; font-weight: 700; }
.quote-change { font-size: 14px; font-weight: 600; margin-left: 10px; }
.quote-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.quote-detail-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }
.quote-detail-val { font-size: 14px; color: var(--text-1); margin-top: 2px; }
.chart-wrap { background: var(--bg-1); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); margin-bottom: 16px; position: relative; min-height: 300px; }
.chart-wrap canvas { width: 100% !important; }
.chart-controls { display: flex; gap: 4px; margin-bottom: 12px; }
.chart-period-btn {
  background: var(--bg-2); border: 1px solid var(--border); color: var(--text-3);
  padding: 4px 12px; border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-mono); font-size: 11px; transition: var(--transition);
}
.chart-period-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

/* ═══════ AI PREDICTION TAB ═══════ */
.ai-panel { background: var(--bg-1); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); margin-bottom: 16px; }
.ai-status { font-size: 12px; color: var(--text-3); margin-top: 8px; }
.progress-bar { width: 100%; height: 6px; background: var(--bg-2); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--cyan); border-radius: 3px; transition: width 0.3s; animation: pulse-bar 1.5s ease-in-out infinite; }
@keyframes pulse-bar { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.pred-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
.pred-card { background: var(--bg-2); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
.pred-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }
.pred-val { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-top: 4px; }
.pred-sub { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.ai-section { background: var(--bg-1); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
.ai-section-title { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--text-0); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.signal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
.signal-card { background: var(--bg-2); border-radius: var(--radius-sm); padding: 12px; }
.signal-name { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
.signal-val { font-size: 13px; font-weight: 600; margin-top: 4px; }
.signal-detail { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.signal-buy { color: var(--green); }
.signal-sell { color: var(--red); }
.signal-neutral { color: var(--text-3); }
.risk-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 3px; font-weight: 600; }
.risk-low { background: rgba(0,230,118,0.15); color: var(--green); }
.risk-medium { background: rgba(255,171,0,0.15); color: var(--amber); }
.risk-high { background: rgba(255,82,82,0.15); color: var(--red); }
.ai-analysis { font-size: 13px; color: var(--text-2); line-height: 1.7; white-space: pre-wrap; }

<script>
// Try loading Supabase from multiple CDNs
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function loadSupabaseSDK() {
  const cdns = [
    'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase-js.min.js',
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase-js.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.3/umd.min.js'
  ];
  for (const url of cdns) {
    try {
      await loadScript(url);
      if (window.supabase) return true;
    } catch(e) { /* try next */ }
  }
  return false;
}

// Load Chart.js
async function loadChartJS() {
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js');
    return !!window.Chart;
  } catch(e) { return false; }

    if (window.tf) {
      try { await window.tf.setBackend('webgl'); }
      catch { await window.tf.setBackend('cpu'); }

// ══════════════════════════════════════════════
// FINNHUB API — REAL-TIME MARKET DATA
// ══════════════════════════════════════════════

function getFinnhubKey() { return localStorage.getItem('finnhub_key') || ''; }
function setFinnhubKey(k) { localStorage.setItem('finnhub_key', k); }

const quoteCache = {};
const CACHE_TTL = 60000; // 1 min

// ── Server-side proxy API (Vercel Serverless Function) ──
// Calls /api/stock which proxies to Yahoo Finance — no CORS issues

async function stockAPI(ticker, range = '1d', interval = '1d') {
  const qs = new URLSearchParams({ ticker, range, interval }).toString();
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000); // 15s timeout
  try {
    const resp = await fetch(`/api/stock?${qs}`, { signal: controller.signal });
    clearTimeout(timeout);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || '数据请求失败: ' + resp.status);
    }
    const json = await resp.json();
    const result = json.chart?.result?.[0];
    if (!result) throw new Error('未找到 ' + ticker);
    return result;
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') throw new Error('数据请求超时 (15s)，请重试');
    throw e;
  }
}

async function fetchQuote(ticker) {
  const cached = quoteCache[ticker];
  if (cached && Date.now() - cached._ts < CACHE_TTL) return cached;

  const result = await stockAPI(ticker, '1d', '1d');
  const meta = result.meta;
  const ind = result.indicators?.quote?.[0];
  const prevClose = meta.chartPreviousClose || meta.previousClose || meta.regularMarketPrice;
  const q = {
    price: meta.regularMarketPrice,
    prevClose,
    change: meta.regularMarketPrice - prevClose,
    changePercent: ((meta.regularMarketPrice - prevClose) / prevClose * 100),
    high: ind?.high?.filter(v => v != null).pop() || meta.regularMarketDayHigh || meta.regularMarketPrice,
    low: ind?.low?.filter(v => v != null).pop() || meta.regularMarketDayLow || meta.regularMarketPrice,
    open: ind?.open?.filter(v => v != null)?.[0] || meta.regularMarketOpen || meta.regularMarketPrice,
    name: meta.shortName || meta.longName || meta.symbol,
    exchange: meta.exchangeName || meta.fullExchangeName || '',
    currency: meta.currency || 'USD',
    _ts: Date.now(),
  };
  quoteCache[ticker] = q;
  return q;
}

async function fetchCandles(ticker, range = '1mo', interval = '1d') {
  const result = await stockAPI(ticker, range, interval);
  const ts = result.timestamp;
  const q = result.indicators?.quote?.[0];
  if (!ts || !q) throw new Error('历史数据为空');
  return ts.map((t, i) => ({
    time: t * 1000,
    open: q.open[i],
    high: q.high[i],
    low: q.low[i],
    close: q.close[i],
    volume: q.volume[i],
  })).filter(c => c.close != null);
}

async function fetchProfile(ticker) {

  return null;

// Period helpers → Yahoo Finance range/interval format
function getPeriodRange(period) {
  switch (period) {
    case 'W':  return { range: '5d',  interval: '15m' };
    case 'M':  return { range: '1mo', interval: '1d' };
    case '3M': return { range: '3mo', interval: '1d' };
    case '6M': return { range: '6mo', interval: '1d' };
    case 'Y':  return { range: '1y',  interval: '1d' };
    case '5Y': return { range: '5y',  interval: '1wk' };
    default:   return { range: '1mo', interval: '1d' };
  }
}

// SMA calculation
function calcSMA(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += data[j];
    return sum / period;
  });
}

function initSupabase(url, key) {

}

async function createTables() {
  // Try to create tables via RPC or just let them exist
  const tables = ['trades', 'moods', 'forecasts', 'notes', 'holdings'];
  for (const t of tables) {
    // Just try to select — if table doesn't exist, user needs to create it
    const { error } = await supabase.from(t).select('id').limit(1);
    if (error && error.code === '42P01') {
      // Table doesn't exist — we'll handle this in setup
      return false;
    }
  }
  return true;
}

async function loadAll() {
  const [t, m, f, n, h] = await Promise.all([
    supabase.from('trades').select('*').order('created_at', { ascending: false }),
    supabase.from('moods').select('*').order('created_at', { ascending: false }),
    supabase.from('forecasts').select('*').order('created_at', { ascending: false }),
    supabase.from('notes').select('*').order('created_at', { ascending: false }),
    supabase.from('holdings').select('*').order('created_at', { ascending: false }),
  ]);
  state.trades = t.data || [];
  state.moods = m.data || [];
  state.forecasts = f.data || [];
  state.notes = n.data || [];
  state.holdings = h.data || [];
}

async function insertRow(table, row) {
  row.id = uid();
  row.created_at = new Date().toISOString();
  const { data, error } = await supabase.from(table).insert([row]).select();
  if (error) { showToast('保存失败: ' + error.message); return; }
  state[table].unshift(data[0]);
  state.showForm = null; state.editItem = null;
  showToast('已保存 ✓');
  render();
}

async function updateRow(table, id, updates) {
  const { error } = await supabase.from(table).update(updates).eq('id', id);
  if (error) { showToast('更新失败: ' + error.message); return; }
  const idx = state[table].findIndex(r => r.id === id);
  if (idx >= 0) state[table][idx] = { ...state[table][idx], ...updates };
  state.showForm = null; state.editItem = null;
  showToast('已更新 ✓');
  render();
}

async function deleteRow(table, id) {
  if (!confirm('确认删除？')) return;
  const { error } = await supabase.from(table).delete().eq('id', id);
  if (error) { showToast('删除失败: ' + error.message); return; }
  state[table] = state[table].filter(r => r.id !== id);
  showToast('已删除');
  render();
}

function exportCSV() {
  const rows = [['类型','日期','标的','方向','仓位%','盈亏%','情绪','置信度','概率%','结果','备注']];
  state.trades.forEach(t => rows.push(['交易', fmtDate(t.created_at), t.ticker, t.direction, t.size, t.pnl, '', '', '', '', t.note]));
  state.moods.forEach(m => rows.push(['情绪', fmtDate(m.created_at), '', '', '', '', m.mood, m.confidence, '', '', m.note]));
  state.forecasts.forEach(f => rows.push(['预测', fmtDate(f.created_at), f.ticker, '', '', '', '', '', f.probability, f.outcome||'', f.note]));
  state.notes.forEach(n => rows.push(['笔记', fmtDate(n.created_at), '', '', '', '', '', '', '', '', n.content]));
  const csv = rows.map(r => r.map(c => `"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artemis-alpha-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV 已导出 ✓');
}

    state.trades = d.trades || [];
    state.moods = d.moods || [];
    state.forecasts = d.forecasts || [];
    state.notes = d.notes || [];
    state.holdings = d.holdings || [];
  }
  state.configured = true;
  state.ready = true;
  state._localMode = true;
  render();
}

function saveLocal() {
  localStorage.setItem('aa_local_data', JSON.stringify({
    trades: state.trades, moods: state.moods,
    forecasts: state.forecasts, notes: state.notes,
    holdings: state.holdings,
  }));
}

async function localInsert(table, row) {
  row.id = uid(); row.created_at = new Date().toISOString();
  state[table].unshift(row);
  state.showForm = null; state.editItem = null;
  saveLocal(); showToast('已保存 ✓'); render();
}

async function localUpdate(table, id, updates) {
  const idx = state[table].findIndex(r => r.id === id);
  if (idx >= 0) state[table][idx] = { ...state[table][idx], ...updates };
  state.showForm = null; state.editItem = null;
  saveLocal(); showToast('已更新 ✓'); render();
}

async function localDelete(table, id) {
  if (!confirm('确认删除？')) return;
  state[table] = state[table].filter(r => r.id !== id);
  saveLocal(); showToast('已删除'); render();
}

// Unified interface
function doInsert(table, row) { return state._localMode ? localInsert(table, row) : insertRow(table, row); }
function doUpdate(table, id, u) { return state._localMode ? localUpdate(table, id, u) : updateRow(table, id, u); }
function doDelete(table, id) { return state._localMode ? localDelete(table, id) : deleteRow(table, id); }

function render() {
  destroyCharts();
  const app = document.getElementById('app');

  if (!state.ready && !state.configured) {
    app.innerHTML = renderSetup();
    return;
  }

  if (!state.ready) {
    app.innerHTML = `<div class="loading-screen"><div class="loading-icon">◈</div><div class="loading-text">LOADING DATA...</div></div>`;
    return;
  }

  const totalTrades = state.trades.length;
  const winTrades = state.trades.filter(t => parseFloat(t.pnl) > 0).length;
  const winRate = totalTrades > 0 ? ((winTrades / totalTrades) * 100).toFixed(0) : '—';
  const avgMood = state.moods.length > 0 ? (state.moods.reduce((s,m) => s + (m.mood||3), 0) / state.moods.length).toFixed(1) : '—';
  const resolved = state.forecasts.filter(f => f.outcome === 'correct' || f.outcome === 'incorrect');
  const accuracy = resolved.length > 0 ? ((resolved.filter(f => f.outcome === 'correct').length / resolved.length) * 100).toFixed(0) : '—';

  let content = '';
  switch (state.tab) {
    case 'dashboard': content = renderDashboard({ totalTrades, winRate, avgMood, accuracy, resolved: resolved.length }); break;
    case 'trades': content = renderTrades(); break;
    case 'moods': content = renderMoods(); break;
    case 'notes': content = renderNotes(); break;
    case 'market': content = renderMarket(); break;
    case 'ai': content = renderAI(); break;
    case 'dl': content = renderDL(); break;
    case 'portfolio': content = renderPortfolio(); break;
  }

  const tabs = [
    { key: 'dashboard', label: '仪表盘', icon: '◉' },
    { key: 'market', label: '市场', icon: '◆' },
    { key: 'ai', label: 'AI预测', icon: '⬡' },
    { key: 'dl', label: '深度学习', icon: '⊞' },
    { key: 'portfolio', label: '组合', icon: '◎' },
    { key: 'trades', label: '交易', icon: '⇄' },
    { key: 'moods', label: '情绪', icon: '◐' },
    { key: 'notes', label: '笔记', icon: '▤' },
  ];

  app.innerHTML = `
    <div class="app">
      <header class="header">
        <div class="header-left">
          <span class="logo">◈</span>
          <div>
            <div class="header-title">ARTEMIS ALPHA</div>
            <div class="header-sub">Investment Decision Audit System</div>
          </div>
        </div>
        <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
      </header>
      <nav class="nav">
        ${tabs.map(t => `<button class="nav-tab ${state.tab===t.key?'active':''}" onclick="switchTab('${t.key}')"><span class="tab-icon">${t.icon}</span> ${t.label}</button>`).join('')}
      </nav>
      <main class="main">${content}</main>
    </div>
  `;
  requestAnimationFrame(afterRender);
}

function switchTab(t) { state.tab = t; state.showForm = null; state.editItem = null; render(); }
function openForm(type) { state.showForm = type; state.editItem = null; render(); }
function cancelForm() { state.showForm = null; state.editItem = null; render(); }
function editItem(table, id) {
  state.editItem = state[table].find(r => r.id === id);
  state.showForm = table.replace(/s$/,''); // trades->trade
  render();
}

async function searchMarket() {
  const ticker = (document.getElementById('market-search')?.value || '').trim().toUpperCase();
  if (!ticker) return;
  await searchMarketTicker(ticker);
}

async function searchMarketTicker(ticker) {
  state.marketTicker = ticker;
  state.marketQuote = null;
  state.marketCandles = null;
  state.marketProfile = null;
  render();
  try {
    const [quote, profile] = await Promise.all([
      fetchQuote(ticker),
      fetchProfile(ticker).catch(() => null),
    ]);
    state.marketQuote = quote;
    state.marketProfile = profile;
    // Load candles
    const { range, interval } = getPeriodRange(state.marketPeriod);
    state.marketCandles = await fetchCandles(ticker, range, interval);
    render();
  } catch (e) {
    showToast(e.message);
    state.marketTicker = ticker;
    render();
  }
}

async function changeMarketPeriod(period) {
  state.marketPeriod = period;
  if (!state.marketTicker) return;
  try {
    const { range, interval } = getPeriodRange(period);
    state.marketCandles = await fetchCandles(state.marketTicker, range, interval);
  } catch(e) { showToast(e.message); }
  render();
}

function initMarketChart() {
  if (!window.Chart || !state.marketCandles || state.marketCandles.length === 0) return;
  const canvas = document.getElementById('market-chart');
  if (!canvas) return;

  const candles = state.marketCandles;
  const closes = candles.map(c => c.close);
  const labels = candles.map(c => {
    const d = new Date(c.time);
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  });
  const sma20 = calcSMA(closes, Math.min(20, Math.floor(closes.length / 2)));
  const sma50 = calcSMA(closes, Math.min(50, Math.floor(closes.length / 2)));
  const volumes = candles.map(c => c.volume);
  const colors = candles.map(c => c.close >= c.open ? 'rgba(0,230,118,0.4)' : 'rgba(255,82,82,0.4)');

  chartInstances['market'] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '收盘价',
          data: closes,
          borderColor: '#00e5ff',
          backgroundColor: 'rgba(0,229,255,0.05)',
          borderWidth: 2,
          pointRadius: 0,
          fill: true,
          tension: 0.1,
          yAxisID: 'y',
        },
        {
          label: 'SMA20',
          data: sma20,
          borderColor: '#ffab00',
          borderWidth: 1.5,
          pointRadius: 0,
          borderDash: [4, 2],
          yAxisID: 'y',
        },
        {
          label: 'SMA50',
          data: sma50,
          borderColor: '#b388ff',
          borderWidth: 1.5,
          pointRadius: 0,
          borderDash: [6, 3],
          yAxisID: 'y',
        },
        {
          label: '成交量',
          data: volumes,
          type: 'bar',
          backgroundColor: colors,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: '#7b8ba8', font: { size: 10 } } },
        tooltip: {
          backgroundColor: '#0a1910',
          borderColor: '#1e442e',
          borderWidth: 1,
          titleColor: '#f0f4fc',
          bodyColor: '#c4cedf',
        },
      },
      scales: {
        x: { ticks: { color: '#4a5874', font: { size: 9 }, maxTicksLimit: 10 }, grid: { color: 'rgba(30,68,46,0.3)' } },
        y: { position: 'right', ticks: { color: '#7b8ba8', font: { size: 10 } }, grid: { color: 'rgba(30,68,46,0.3)' } },
        y1: { position: 'left', ticks: { display: false }, grid: { display: false }, max: Math.max(...volumes) * 4 },
      },
    },
  });
}

// EMA calculation helper
function calcEMA(closes, period) {
  if (closes.length < period) return null;
  const k = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for (let i = period; i < closes.length; i++) ema = closes[i] * k + ema * (1 - k);
  return ema;
}

// Calculate comprehensive technical indicators from price data
function calcIndicators(closes) {
  const sma = (arr, n) => arr.length < n ? null : arr.slice(-n).reduce((a,b)=>a+b,0)/n;
  const last = closes[closes.length - 1];

  // RSI (14-day) with Wilder's smoothing
  let avgGain = 0, avgLoss = 0;
  const rsiPeriod = Math.min(14, closes.length - 1);
  for (let i = closes.length - rsiPeriod; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) avgGain += diff; else avgLoss -= diff;
  }
  avgGain /= rsiPeriod;
  avgLoss /= rsiPeriod;
  const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
  const rsi = 100 - (100 / (1 + rs));

  // SMA
  const sma20 = sma(closes, 20);
  const sma50 = sma(closes, 50);
  const sma200 = sma(closes, 200);

  // EMA (12, 26 for MACD)
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const ema20 = calcEMA(closes, 20);

  // True MACD
  let macdLine = null, signalLine = null, macdHist = null;
  if (ema12 !== null && ema26 !== null && closes.length >= 35) {
    // Build full MACD line series for signal line calculation
    const k12 = 2/13, k26 = 2/27, k9 = 2/10;
    let e12 = closes.slice(0,12).reduce((a,b)=>a+b,0)/12;
    let e26 = closes.slice(0,26).reduce((a,b)=>a+b,0)/26;
    const macdSeries = [];
    for (let i = 12; i < closes.length; i++) {
      e12 = closes[i]*k12 + e12*(1-k12);
      if (i >= 26) {
        e26 = closes[i]*k26 + e26*(1-k26);
        macdSeries.push(e12 - e26);
      } else {
        e26 = closes.slice(0,i+1).reduce((a,b)=>a+b,0)/(i+1); // approximate
      }
    }
    macdLine = macdSeries[macdSeries.length - 1];
    // Signal line = 9-period EMA of MACD
    if (macdSeries.length >= 9) {
      let sig = macdSeries.slice(0,9).reduce((a,b)=>a+b,0)/9;
      for (let i = 9; i < macdSeries.length; i++) sig = macdSeries[i]*k9 + sig*(1-k9);
      signalLine = sig;
      macdHist = macdLine - signalLine;
    }
  }

  // Bollinger Bands (20-day)
  const recent20 = closes.slice(-20);
  const mean20 = recent20.reduce((a,b)=>a+b,0)/recent20.length;
  const variance = recent20.reduce((a,b)=>a+(b-mean20)**2,0)/recent20.length;
  const volatility = Math.sqrt(variance);
  const bbUpper = mean20 + 2 * volatility;
  const bbLower = mean20 - 2 * volatility;
  const bbWidth = (bbUpper - bbLower) / mean20;
  const bbPosition = volatility > 0 ? (last - bbLower) / (bbUpper - bbLower) : 0.5; // 0=lower band, 1=upper band

  // ATR (14-day) approximation using close-to-close
  let atr = 0;
  const atrPeriod = Math.min(14, closes.length - 1);
  for (let i = closes.length - atrPeriod; i < closes.length; i++) {
    atr += Math.abs(closes[i] - closes[i-1]);
  }
  atr /= atrPeriod;

  // Rate of Change (ROC) - multiple timeframes
  const roc5 = closes.length > 5 ? (last - closes[closes.length-6]) / closes[closes.length-6] * 100 : 0;
  const roc10 = closes.length > 10 ? (last - closes[closes.length-11]) / closes[closes.length-11] * 100 : 0;
  const roc20 = closes.length > 20 ? (last - closes[closes.length-21]) / closes[closes.length-21] * 100 : 0;

  return {
    rsi: rsi.toFixed(1), sma20: sma20?.toFixed(2), sma50: sma50?.toFixed(2), sma200: sma200?.toFixed(2),
    ema12: ema12?.toFixed(2), ema26: ema26?.toFixed(2), ema20: ema20?.toFixed(2),
    macdLine: macdLine?.toFixed(3), signalLine: signalLine?.toFixed(3), macdHist: macdHist?.toFixed(3),
    bbUpper: bbUpper.toFixed(2), bbLower: bbLower.toFixed(2), bbWidth: bbWidth.toFixed(4), bbPosition: bbPosition.toFixed(3),
    volatility: volatility.toFixed(2), atr: atr.toFixed(2),
    roc5: roc5.toFixed(2), roc10: roc10.toFixed(2), roc20: roc20.toFixed(2),
    lastPrice: last.toFixed(2)
  };
}

// Calculate Beta from stock returns vs S&P 500 returns
function calcBeta(stockCloses, sp500Closes) {
  if (!sp500Closes || sp500Closes.length < 30) return null;
  // Align lengths (use shorter)
  const len = Math.min(stockCloses.length, sp500Closes.length);
  const sc = stockCloses.slice(-len);
  const mc = sp500Closes.slice(-len);

  // Calculate daily returns
  const stockRets = [], mktRets = [];
  for (let i = 1; i < len; i++) {
    stockRets.push((sc[i] - sc[i-1]) / sc[i-1]);
    mktRets.push((mc[i] - mc[i-1]) / mc[i-1]);
  }
  if (stockRets.length < 20) return null;

  // Beta = Cov(stock, market) / Var(market)
  const n = stockRets.length;
  const avgS = stockRets.reduce((a,b)=>a+b,0)/n;
  const avgM = mktRets.reduce((a,b)=>a+b,0)/n;
  let cov = 0, varM = 0;
  for (let i = 0; i < n; i++) {
    cov += (stockRets[i] - avgS) * (mktRets[i] - avgM);
    varM += (mktRets[i] - avgM) ** 2;
  }
  cov /= n;
  varM /= n;
  if (varM === 0) return null;

  const beta = cov / varM;

  // Also calc correlation (R²)
  let varS = 0;
  for (let i = 0; i < n; i++) varS += (stockRets[i] - avgS) ** 2;
  varS /= n;
  const correlation = (varS > 0 && varM > 0) ? cov / Math.sqrt(varS * varM) : 0;

  return { beta: Math.round(beta * 100) / 100, correlation: Math.round(correlation * 100) / 100, period: n };
}

// Analyze fundamentals and return score + report
function analyzeFundamentals(fund, currentPrice) {
  if (!fund) return { score: 0, signals: [], report: '', rating: '数据不可用', details: null };

  let fScore = 0;
  const signals = [];
  const reportLines = [];
  const pct = (v) => v != null ? (v * 100).toFixed(1) + '%' : 'N/A';
  const fmt = (v, d=2) => v != null ? Number(v).toFixed(d) : 'N/A';
  const fmtB = (v) => {
    if (v == null) return 'N/A';
    if (v >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
    if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
    if (v >= 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
    return '$' + v.toFixed(0);
  };

  // === Valuation ===
  reportLines.push('【估值】');
  if (fund.pe != null) {
    reportLines.push(`  市盈率 (TTM P/E): ${fmt(fund.pe)}`);
    if (fund.pe < 0) { fScore -= 3; reportLines.push('    → 负市盈率，公司亏损中'); }
    else if (fund.pe < 15) { fScore += 4; signals.push({ name: 'P/E', signal: 'buy', detail: `P/E ${fmt(fund.pe)}，估值偏低` }); }
    else if (fund.pe < 25) { fScore += 1; }
    else if (fund.pe < 40) { fScore -= 1; }
    else { fScore -= 4; signals.push({ name: 'P/E', signal: 'sell', detail: `P/E ${fmt(fund.pe)}，估值偏高` }); }
  }
  if (fund.forwardPE != null) {
    reportLines.push(`  远期市盈率 (Forward P/E): ${fmt(fund.forwardPE)}`);
    if (fund.pe != null && fund.forwardPE < fund.pe * 0.8) {
      fScore += 2; reportLines.push('    → 远期P/E显著低于当前，预期盈利增长');
    }
  }
  if (fund.pegRatio != null) {
    reportLines.push(`  PEG 比率: ${fmt(fund.pegRatio)}`);
    if (fund.pegRatio > 0 && fund.pegRatio < 1) { fScore += 3; signals.push({ name: 'PEG', signal: 'buy', detail: `PEG ${fmt(fund.pegRatio)}，低于1说明成长性被低估` }); }
    else if (fund.pegRatio > 2) { fScore -= 2; }
  }
  if (fund.priceToBook != null) reportLines.push(`  市净率 (P/B): ${fmt(fund.priceToBook)}`);
  if (fund.priceToSales != null) reportLines.push(`  市销率 (P/S): ${fmt(fund.priceToSales)}`);

  reportLines.push('\n【盈利能力】');
  if (fund.eps != null) reportLines.push(`  每股收益 (EPS): $${fmt(fund.eps)}`);
  if (fund.revenueGrowth != null) {
    reportLines.push(`  营收增长率: ${pct(fund.revenueGrowth)}`);
    if (fund.revenueGrowth > 0.2) { fScore += 4; signals.push({ name: '营收增长', signal: 'buy', detail: `营收增长 ${pct(fund.revenueGrowth)}，高速增长` }); }
    else if (fund.revenueGrowth > 0.05) { fScore += 2; }
    else if (fund.revenueGrowth < -0.05) { fScore -= 3; signals.push({ name: '营收增长', signal: 'sell', detail: `营收下滑 ${pct(fund.revenueGrowth)}` }); }
  }
  if (fund.earningsGrowth != null) {
    reportLines.push(`  盈利增长率: ${pct(fund.earningsGrowth)}`);
    if (fund.earningsGrowth > 0.25) fScore += 3;
    else if (fund.earningsGrowth < -0.1) fScore -= 3;
  }
  if (fund.profitMargin != null) {
    reportLines.push(`  净利润率: ${pct(fund.profitMargin)}`);
    if (fund.profitMargin > 0.2) fScore += 2;
    else if (fund.profitMargin < 0) fScore -= 3;
  }
  if (fund.operatingMargin != null) reportLines.push(`  营业利润率: ${pct(fund.operatingMargin)}`);
  if (fund.grossMargin != null) reportLines.push(`  毛利率: ${pct(fund.grossMargin)}`);
  if (fund.returnOnEquity != null) {
    reportLines.push(`  净资产收益率 (ROE): ${pct(fund.returnOnEquity)}`);
    if (fund.returnOnEquity > 0.2) { fScore += 2; reportLines.push('    → ROE优秀，资本回报率高'); }
    else if (fund.returnOnEquity < 0.05) fScore -= 1;
  }

  // === Financial Health ===
  reportLines.push('\n【财务健康】');
  if (fund.totalRevenue != null) reportLines.push(`  总营收: ${fund.totalRevenueFmt || fmtB(fund.totalRevenue)}`);

    reportLines.push(`  自由现金流: ${fund.freeCashflowFmt || fmtB(fund.freeCashflow)}`);
    if (fund.freeCashflow > 0) { fScore += 2; } else { fScore -= 2; reportLines.push('    → 自由现金流为负，关注烧钱速度'); }
  }
  if (fund.debtToEquity != null) {
    reportLines.push(`  负债/权益比: ${fmt(fund.debtToEquity)}`);
    if (fund.debtToEquity > 200) { fScore -= 3; signals.push({ name: '杠杆', signal: 'sell', detail: `D/E ${fmt(fund.debtToEquity)}，高杠杆风险` }); }
    else if (fund.debtToEquity < 50) { fScore += 1; }
  }
  if (fund.currentRatio != null) {
    reportLines.push(`  流动比率: ${fmt(fund.currentRatio)}`);
    if (fund.currentRatio < 1) { fScore -= 2; reportLines.push('    → 流动比率<1，短期偿债风险'); }
  }
  if (fund.totalCash != null) reportLines.push(`  总现金: ${fmtB(fund.totalCash)}`);
  if (fund.totalDebt != null) reportLines.push(`  总负债: ${fmtB(fund.totalDebt)}`);

  // === Dividend ===
  if (fund.dividendYield != null && fund.dividendYield > 0) {
    reportLines.push('\n【分红】');
    reportLines.push(`  股息率: ${pct(fund.dividendYield)}`);
    if (fund.payoutRatio != null) reportLines.push(`  派息率: ${pct(fund.payoutRatio)}`);
    if (fund.dividendYield > 0.03) fScore += 1;
  }

  // === Analyst Targets ===
  if (fund.targetMeanPrice != null && currentPrice > 0) {
    reportLines.push('\n【分析师目标】');
    const upside = ((fund.targetMeanPrice - currentPrice) / currentPrice * 100);
    reportLines.push(`  平均目标价: $${fmt(fund.targetMeanPrice)} (${upside > 0 ? '+' : ''}${upside.toFixed(1)}%)`);
    if (fund.targetHighPrice != null) reportLines.push(`  最高目标价: $${fmt(fund.targetHighPrice)}`);
    if (fund.targetLowPrice != null) reportLines.push(`  最低目标价: $${fmt(fund.targetLowPrice)}`);
    if (fund.numberOfAnalystOpinions != null) reportLines.push(`  分析师数量: ${fund.numberOfAnalystOpinions}`);
    if (fund.recommendationKey) reportLines.push(`  综合评级: ${fund.recommendationKey}`);

    if (upside > 20) { fScore += 4; signals.push({ name: '目标价', signal: 'buy', detail: `分析师目标价 $${fmt(fund.targetMeanPrice)}，上行空间 +${upside.toFixed(0)}%` }); }
    else if (upside > 5) { fScore += 2; }
    else if (upside < -10) { fScore -= 3; signals.push({ name: '目标价', signal: 'sell', detail: `分析师目标价 $${fmt(fund.targetMeanPrice)}，下行风险 ${upside.toFixed(0)}%` }); }
  }

  // === 52-week position ===
  if (fund.fiftyTwoWeekHigh != null && fund.fiftyTwoWeekLow != null && currentPrice > 0) {
    const range52 = fund.fiftyTwoWeekHigh - fund.fiftyTwoWeekLow;
    const pos52 = range52 > 0 ? ((currentPrice - fund.fiftyTwoWeekLow) / range52 * 100) : 50;
    reportLines.push(`\n【52周区间】`);
    reportLines.push(`  52周低: $${fmt(fund.fiftyTwoWeekLow)} | 52周高: $${fmt(fund.fiftyTwoWeekHigh)} | 当前位置: ${pos52.toFixed(0)}%`);
    if (pos52 > 90) { fScore -= 2; reportLines.push('    → 接近52周高点，追高风险'); }
    else if (pos52 < 20) { fScore += 2; reportLines.push('    → 接近52周低点，可能存在价值'); }
  }

  // === Short interest ===
  if (fund.shortPercentOfFloat != null) {
    reportLines.push(`\n  做空比例: ${pct(fund.shortPercentOfFloat)}`);
    if (fund.shortPercentOfFloat > 0.1) { fScore -= 2; reportLines.push('    → 高空头占比，市场看空情绪较重'); }
  }

  // Overall rating
  let rating;
  if (fScore >= 10) rating = '基本面优秀';
  else if (fScore >= 5) rating = '基本面良好';
  else if (fScore >= 0) rating = '基本面中性';
  else if (fScore >= -5) rating = '基本面偏弱';
  else rating = '基本面较差';

  return { score: fScore, signals, report: reportLines.join('\n'), rating, details: fund };
}

// === Deep Analysis Modules ===

// K-line candlestick pattern recognition
function detectCandlePatterns(candles) {
  if (!candles || candles.length < 5) return [];
  const patterns = [];
  const recent = candles.slice(-5);

  for (let i = 1; i < recent.length; i++) {
    const c = recent[i], p = recent[i-1];
    const body = Math.abs(c.close - c.open);
    const range = c.high - c.low;
    const upperShadow = c.high - Math.max(c.open, c.close);
    const lowerShadow = Math.min(c.open, c.close) - c.low;
    const pBody = Math.abs(p.close - p.open);
    const isBullish = c.close > c.open;
    const pBullish = p.close > p.open;

    // Doji: tiny body, significant range
    if (body < range * 0.1 && range > 0) {
      patterns.push({ name: '十字星', type: 'neutral', detail: '多空力量平衡，可能变盘', weight: 0 });
    }
    // Hammer: small body at top, long lower shadow (bullish reversal)
    if (lowerShadow > body * 2 && upperShadow < body * 0.5 && range > 0) {
      patterns.push({ name: '锤子线', type: 'buy', detail: '下影线长，底部反转信号', weight: 3 });
    }
    // Shooting star: small body at bottom, long upper shadow (bearish reversal)
    if (upperShadow > body * 2 && lowerShadow < body * 0.5 && range > 0) {
      patterns.push({ name: '射击之星', type: 'sell', detail: '上影线长，顶部反转信号', weight: -3 });
    }
    // Bullish engulfing
    if (isBullish && !pBullish && c.close > p.open && c.open < p.close && body > pBody) {
      patterns.push({ name: '看涨吞没', type: 'buy', detail: '阳线完全吞没前一根阴线，强烈反转信号', weight: 5 });
    }
    // Bearish engulfing
    if (!isBullish && pBullish && c.open > p.close && c.close < p.open && body > pBody) {
      patterns.push({ name: '看跌吞没', type: 'sell', detail: '阴线完全吞没前一根阳线，强烈反转信号', weight: -5 });
    }
    // Morning star (3-bar pattern)
    if (i >= 2) {
      const pp = recent[i-2];
      const ppBody = Math.abs(pp.close - pp.open);
      const pRange = p.high - p.low;
      // Previous-previous: big bearish, previous: small body (star), current: big bullish
      if (pp.close < pp.open && ppBody > pRange && pBody < ppBody * 0.3 && isBullish && body > ppBody * 0.5) {
        patterns.push({ name: '启明星', type: 'buy', detail: '经典底部反转三线形态', weight: 6 });
      }
      // Evening star
      if (pp.close > pp.open && ppBody > pRange && pBody < ppBody * 0.3 && !isBullish && body > ppBody * 0.5) {
        patterns.push({ name: '黄昏星', type: 'sell', detail: '经典顶部反转三线形态', weight: -6 });
      }
    }
  }

  // Three consecutive bullish/bearish
  const last3 = recent.slice(-3);
  if (last3.every(c => c.close > c.open)) {
    patterns.push({ name: '三连阳', type: 'buy', detail: '连续三根阳线，多头强势', weight: 4 });
  }
  if (last3.every(c => c.close < c.open)) {
    patterns.push({ name: '三连阴', type: 'sell', detail: '连续三根阴线，空头强势', weight: -4 });
  }

  return patterns;
}

// Volume analysis
function analyzeVolume(candles) {
  if (!candles || candles.length < 30) return { signal: 'neutral', detail: '数据不足', obv: 0, volumeRatio: 1, trend: '' };
  const recent = candles.slice(-30);
  const last5Vol = recent.slice(-5).reduce((a,c) => a + (c.volume||0), 0) / 5;
  const avg20Vol = recent.slice(-20).reduce((a,c) => a + (c.volume||0), 0) / 20;
  const volumeRatio = avg20Vol > 0 ? last5Vol / avg20Vol : 1;

  // OBV (On-Balance Volume)
  let obv = 0;
  for (let i = 1; i < recent.length; i++) {
    if (recent[i].close > recent[i-1].close) obv += recent[i].volume || 0;
    else if (recent[i].close < recent[i-1].close) obv -= recent[i].volume || 0;
  }

  // OBV trend: compare last 5 days OBV vs previous 5 days
  let obvRecent = 0, obvPrev = 0;
  for (let i = recent.length - 5; i < recent.length; i++) {
    if (recent[i].close > recent[i-1].close) obvRecent += recent[i].volume || 0;
    else obvRecent -= recent[i].volume || 0;
  }
  for (let i = recent.length - 10; i < recent.length - 5; i++) {
    if (recent[i].close > recent[i-1].close) obvPrev += recent[i].volume || 0;
    else obvPrev -= recent[i].volume || 0;
  }

  // Volume-price confirmation
  const priceUp = recent[recent.length-1].close > recent[recent.length-6].close;
  const volUp = volumeRatio > 1.1;
  const volDown = volumeRatio < 0.8;

  let signal = 'neutral', detail = '', trend = '';

  if (priceUp && volUp) {
    signal = 'buy'; detail = '价涨量增，趋势健康'; trend = '量价齐升';
  } else if (priceUp && volDown) {
    signal = 'neutral'; detail = '价涨量缩，上涨动能不足'; trend = '量价背离（弱）';
  } else if (!priceUp && volUp) {
    signal = 'sell'; detail = '价跌量增，抛压沉重'; trend = '放量下跌';
  } else if (!priceUp && volDown) {
    signal = 'neutral'; detail = '价跌量缩，抛压减弱'; trend = '缩量调整';
  }

  // OBV divergence
  if (priceUp && obvRecent < obvPrev) {
    detail += '；OBV背离（量能未确认涨势）'; signal = signal === 'buy' ? 'neutral' : signal;
  } else if (!priceUp && obvRecent > obvPrev) {
    detail += '；OBV底背离（量能暗示反转）'; signal = signal === 'sell' ? 'neutral' : 'buy';
  }

  return { signal, detail, obv, volumeRatio: Math.round(volumeRatio * 100) / 100, trend };
}

// RSI and MACD divergence detection
function detectDivergences(closes, indicators) {
  const divergences = [];
  if (closes.length < 30) return divergences;

  const rsi = parseFloat(indicators.rsi);

  // Look at price and RSI over last 20 bars
  const len = Math.min(20, closes.length);
  const prices = closes.slice(-len);
  const rsis = [];
  for (let i = closes.length - len; i <= closes.length - 1; i++) {
    const slice = closes.slice(0, i + 1);
    let g = 0, l = 0;
    const p = Math.min(14, slice.length - 1);
    for (let j = slice.length - p; j < slice.length; j++) {
      const d = slice[j] - slice[j-1];
      if (d > 0) g += d; else l -= d;
    }
    g /= p; l /= p;
    const r = l === 0 ? 100 : g / l;
    rsis.push(100 - (100 / (1 + r)));
  }

  // Find local lows and highs in prices
  const priceLow1 = Math.min(...prices.slice(0, Math.floor(len/2)));
  const priceLow2 = Math.min(...prices.slice(Math.floor(len/2)));
  const priceHigh1 = Math.max(...prices.slice(0, Math.floor(len/2)));
  const priceHigh2 = Math.max(...prices.slice(Math.floor(len/2)));

  const rsiLow1 = Math.min(...rsis.slice(0, Math.floor(len/2)));
  const rsiLow2 = Math.min(...rsis.slice(Math.floor(len/2)));
  const rsiHigh1 = Math.max(...rsis.slice(0, Math.floor(len/2)));
  const rsiHigh2 = Math.max(...rsis.slice(Math.floor(len/2)));

  // Bullish RSI divergence: price makes lower low, RSI makes higher low
  if (priceLow2 < priceLow1 && rsiLow2 > rsiLow1 + 3) {
    divergences.push({ type: 'RSI底背离', signal: 'buy', detail: '价格创新低但RSI未创新低，暗示下跌动能减弱，反弹概率大', weight: 5 });
  }
  // Bearish RSI divergence: price makes higher high, RSI makes lower high
  if (priceHigh2 > priceHigh1 && rsiHigh2 < rsiHigh1 - 3) {
    divergences.push({ type: 'RSI顶背离', signal: 'sell', detail: '价格创新高但RSI未创新高，暗示上涨动能衰竭，回调概率大', weight: -5 });
  }

  // MACD divergence using histogram
  const macdHist = parseFloat(indicators.macdHist) || 0;
  if (priceLow2 < priceLow1 && macdHist > -0.5) {
    divergences.push({ type: 'MACD底背离', signal: 'buy', detail: '价格走低但MACD柱状图收窄/转正，底部反转信号', weight: 4 });
  }
  if (priceHigh2 > priceHigh1 && macdHist < 0.5 && parseFloat(indicators.macdLine) > 0) {
    divergences.push({ type: 'MACD顶背离', signal: 'sell', detail: '价格走高但MACD动能减弱，顶部预警', weight: -4 });
  }

  return divergences;
}

// Fibonacci retracement levels
function calcFibonacci(closes) {
  if (closes.length < 60) return null;
  const recent = closes.slice(-60);
  const high = Math.max(...recent);
  const low = Math.min(...recent);
  const diff = high - low;
  if (diff < 0.01) return null;

  // Determine if we're in uptrend or downtrend
  const isUptrend = closes[closes.length - 1] > closes[closes.length - 30];

  const levels = [
    { ratio: 0, price: isUptrend ? low : high, label: isUptrend ? '底部' : '顶部' },
    { ratio: 0.236, price: isUptrend ? low + diff * 0.236 : high - diff * 0.236, label: '23.6%' },
    { ratio: 0.382, price: isUptrend ? low + diff * 0.382 : high - diff * 0.382, label: '38.2%' },
    { ratio: 0.5, price: isUptrend ? low + diff * 0.5 : high - diff * 0.5, label: '50.0%' },
    { ratio: 0.618, price: isUptrend ? low + diff * 0.618 : high - diff * 0.618, label: '61.8%' },
    { ratio: 0.786, price: isUptrend ? low + diff * 0.786 : high - diff * 0.786, label: '78.6%' },
    { ratio: 1, price: isUptrend ? high : low, label: isUptrend ? '顶部' : '底部' },
  ];

  // Find nearest level to current price
  const last = closes[closes.length - 1];
  let nearest = levels[0];
  let minDist = Math.abs(last - levels[0].price);
  for (const lv of levels) {
    const dist = Math.abs(last - lv.price);
    if (dist < minDist) { minDist = dist; nearest = lv; }
  }

  return { levels, nearest, high, low, isUptrend };
}

// Market regime detection
function detectRegime(closes, indicators) {
  const vol = parseFloat(indicators.volatility) || 0;
  const atr = parseFloat(indicators.atr) || 0;
  const last = closes[closes.length - 1];
  const roc20 = parseFloat(indicators.roc20) || 0;
  const bbWidth = parseFloat(indicators.bbWidth) || 0;
  const sma50 = parseFloat(indicators.sma50) || last;
  const sma200 = parseFloat(indicators.sma200) || last;

  // ADX approximation using directional movement
  let plusDM = 0, minusDM = 0, trSum = 0;
  const adxPeriod = Math.min(14, closes.length - 1);
  for (let i = closes.length - adxPeriod; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    const tr = Math.abs(diff);
    trSum += tr;
    if (diff > 0) plusDM += diff; else minusDM -= diff;
  }
  const plusDI = trSum > 0 ? (plusDM / trSum) * 100 : 50;
  const minusDI = trSum > 0 ? (minusDM / trSum) * 100 : 50;
  const adx = Math.abs(plusDI - minusDI) / (plusDI + minusDI + 0.001) * 100;

  // Regime classification
  let regime, regimeDetail;
  const volPct = vol / last * 100;

  if (adx > 40 && Math.abs(roc20) > 8) {
    regime = '强趋势';
    regimeDetail = roc20 > 0 ? `强劲上升趋势，ADX ${adx.toFixed(0)}，20日涨幅 ${roc20}%` : `强劲下降趋势，ADX ${adx.toFixed(0)}，20日跌幅 ${roc20}%`;
  } else if (adx > 25 && Math.abs(roc20) > 3) {
    regime = '温和趋势';
    regimeDetail = roc20 > 0 ? `温和上升趋势，方向明确但力度有限` : `温和下降趋势，空头占优但动能不强`;
  } else if (bbWidth < 0.06 && volPct < 2) {
    regime = '低波动盘整';
    regimeDetail = `布林带收窄（${(bbWidth*100).toFixed(1)}%），波动率极低，可能蓄势待变`;
  } else if (volPct > 4) {
    regime = '高波动';
    regimeDetail = `波动率异常偏高（${volPct.toFixed(1)}%），市场情绪极端，谨慎操作`;
  } else {
    regime = '区间震荡';
    regimeDetail = `无明显趋势，价格在区间内波动，适合高抛低吸`;
  }

  // Golden/Death cross
  let cross = '';
  if (sma50 > sma200 && Math.abs(sma50 - sma200) / sma200 < 0.02) {
    cross = '金叉形成中（SMA50上穿SMA200），中长期看多信号';
  } else if (sma50 < sma200 && Math.abs(sma50 - sma200) / sma200 < 0.02) {
    cross = '死叉形成中（SMA50下穿SMA200），中长期看空信号';
  } else if (sma50 > sma200) {
    cross = 'SMA50在SMA200上方，中长期多头格局';
  } else {
    cross = 'SMA50在SMA200下方，中长期空头格局';
  }

  return { regime, regimeDetail, adx: adx.toFixed(1), plusDI: plusDI.toFixed(1), minusDI: minusDI.toFixed(1), cross, bbWidth: (bbWidth*100).toFixed(1) };
}

function generateLocalAnalysis(ticker, closes, indicators, candles, macroData, fundamentalsData, sp500Closes) {
  const last = closes[closes.length - 1];
  const rsi = parseFloat(indicators.rsi);
  const sma20 = parseFloat(indicators.sma20) || last;
  const sma50 = parseFloat(indicators.sma50) || last;
  const sma200 = parseFloat(indicators.sma200) || last;
  const ema20 = parseFloat(indicators.ema20) || sma20;
  const vol = parseFloat(indicators.volatility) || 1;
  const atr = parseFloat(indicators.atr) || vol;
  const macdHist = parseFloat(indicators.macdHist) || 0;
  const macdLine = parseFloat(indicators.macdLine) || 0;
  const signalLine = parseFloat(indicators.signalLine) || 0;
  const bbPosition = parseFloat(indicators.bbPosition) || 0.5;
  const bbUpper = parseFloat(indicators.bbUpper) || last * 1.02;
  const bbLower = parseFloat(indicators.bbLower) || last * 0.98;
  const roc5 = parseFloat(indicators.roc5) || 0;
  const roc10 = parseFloat(indicators.roc10) || 0;
  const roc20 = parseFloat(indicators.roc20) || 0;
  const volFactor = vol / last;

  // === Weighted multi-factor scoring system ===
  let score = 0; // Range: roughly -100 to +100

  // 1. Price vs Moving Averages (weight: 25%)
  if (last > sma20) score += 5; else score -= 5;
  if (last > sma50) score += 7; else score -= 7;
  if (last > sma200) score += 8; else score -= 8;
  if (sma20 > sma50) score += 5; else score -= 5;

  // 2. MACD signals (weight: 20%)
  if (macdHist > 0) score += 8; else score -= 8;
  if (macdLine > signalLine) score += 6; else score -= 6;
  // MACD histogram momentum (accelerating vs decelerating)
  if (macdHist > 0 && roc5 > 0) score += 6;
  else if (macdHist < 0 && roc5 < 0) score -= 6;

  // 3. RSI signals (weight: 15%) - with mean reversion bias
  if (rsi >= 70) score -= 10; // overbought = bearish pressure
  else if (rsi <= 30) score += 10; // oversold = bullish bounce
  else if (rsi > 55) score += 4;
  else if (rsi < 45) score -= 4;

  // 4. Bollinger Band position (weight: 15%) - mean reversion
  if (bbPosition > 0.95) score -= 8; // near upper band = likely pullback
  else if (bbPosition < 0.05) score += 8; // near lower band = likely bounce
  else if (bbPosition > 0.8) score -= 3;
  else if (bbPosition < 0.2) score += 3;

  // 5. Multi-timeframe momentum (weight: 15%)
  if (roc5 > 0 && roc10 > 0 && roc20 > 0) score += 10; // aligned bullish
  else if (roc5 < 0 && roc10 < 0 && roc20 < 0) score -= 10; // aligned bearish
  else if (roc5 > 0 && roc10 > 0) score += 5;
  else if (roc5 < 0 && roc10 < 0) score -= 5;
  // Short-term reversal detection: if 5-day momentum diverges from 20-day
  if (roc5 > 2 && roc20 < -5) score -= 3; // dead cat bounce warning
  if (roc5 < -2 && roc20 > 5) score += 3; // pullback in uptrend

  // 6. Acceleration: is momentum increasing or decreasing?
  if (Math.abs(roc5) > Math.abs(roc10/2)) {
    // Momentum is accelerating in the 5-day direction
    score += roc5 > 0 ? 4 : -4;
  }

  // 7. Price distance from SMA200 (long-term trend anchor)
  const distSma200 = (last - sma200) / sma200;
  if (distSma200 > 0.15) score += 3; // strong uptrend far above SMA200
  else if (distSma200 < -0.15) score -= 3;

  // 8. Volatility regime (weight: 10%)
  if (volFactor > 0.04) score *= 0.7; // high volatility reduces conviction

  const trend = score >= 12 ? 'bullish' : score <= -12 ? 'bearish' : 'neutral';
  const confidence = Math.min(85, Math.max(25, 50 + Math.abs(score) * 0.5));

  // === Adaptive Price Prediction Model v3 ===
  // Dynamically blends mean-reversion vs trend-following based on trend strength
  const meanRevTarget = ema20;

  // Multi-timeframe momentum
  const recent5 = closes.slice(-5);
  const recent10 = closes.slice(-10);
  const mom5 = (recent5[recent5.length - 1] - recent5[0]) / recent5[0];
  const mom10 = recent10.length >= 10 ? (recent10[recent10.length - 1] - recent10[0]) / recent10[0] : mom5;
  const dailyMomentum = mom5 / 5;

  // Trend strength: how aligned are all signals? (0=no trend, 1=strong trend)
  const absScore = Math.abs(score);
  const trendStrength = Math.min(1, absScore / 50);
  const trendDir = score > 0 ? 1 : score < 0 ? -1 : 0;

  // Adaptive weights: strong trend → follow momentum; weak trend → mean revert
  const wMeanRev = 0.5 * (1 - trendStrength); // 0-50% weight
  const wMomentum = 0.3 + 0.2 * trendStrength; // 30-50% weight
  const wTrend = 0.2 + 0.3 * trendStrength;    // 20-50% weight

  const predictions = [1, 2, 3, 5, 10].map(day => {
    // Mean reversion: pull toward EMA20 (stronger for short-term)
    const reversionGap = (meanRevTarget - last) / last;
    const reversionDrift = reversionGap * 0.3 * Math.min(day, 5) / 5;

    // Momentum: blend 5-day and 10-day, with decay
    const decay = Math.pow(0.9, day);
    const blendedMom = (dailyMomentum * 0.6 + (mom10 / 10) * 0.4);
    const momentumDrift = blendedMom * day * decay;

    // Trend: persistent drift from multi-factor score
    const trendDrift = trendDir * trendStrength * 0.003 * day;

    // RSI extreme override: strong mean-reversion signal
    let rsiOverride = 0;
    if (rsi > 75) rsiOverride = -0.003 * day * Math.min(day, 5) / 5;
    else if (rsi < 25) rsiOverride = 0.003 * day * Math.min(day, 5) / 5;

    // Combine with adaptive weights
    const rawDrift = reversionDrift * wMeanRev + momentumDrift * wMomentum + trendDrift * wTrend + rsiOverride;

    // Volatility damping (less aggressive)
    const volDamping = 1 / (1 + volFactor * day * 0.3);
    const totalDrift = rawDrift * volDamping;

    // Clamp to reasonable range
    const maxMove = (atr * 2.5 * Math.sqrt(day)) / last;
    const clampedDrift = Math.max(-maxMove, Math.min(maxMove, totalDrift));

    const price = last * (1 + clampedDrift);
    const reasons = {
      1: reversionDrift > 0.005 ? '价格低于均线，存在回归动力' : reversionDrift < -0.005 ? '价格高于均线，存在回落压力' : (score > 10 ? '短线支撑有效，动能延续' : score < -10 ? '短线压力明显' : '短线震荡整理'),
      2: macdHist > 0 ? 'MACD柱状图为正，趋势延续' : macdHist < 0 ? 'MACD柱状图为负，下行风险' : '趋势延续，量价配合',
      3: `布林带位置 ${(bbPosition*100).toFixed(0)}%，${bbPosition > 0.8 ? '接近上轨压力' : bbPosition < 0.2 ? '接近下轨支撑' : '中轨附近整理'}`,
      5: score > 15 ? '多因子信号偏多，均线与MACD共振' : score < -15 ? '多因子信号偏空，均线与MACD压制' : '多空分歧，区间震荡为主',
      10: `基于均值回归与动量衰减模型预测（ATR: $${atr.toFixed(2)}）`,
    };
    return { day, price: Math.round(price * 100) / 100, reason: reasons[day] };
  });

  // === Improved Support/Resistance using pivot points & clusters ===
  const recent60 = closes.slice(-60);
  const low60 = Math.min(...recent60);
  const high60 = Math.max(...recent60);
  // Use Bollinger Bands as dynamic S/R
  const support = Math.max(bbLower * 0.995, low60 * 0.99);
  const resistance = Math.min(bbUpper * 1.005, high60 * 1.01);

  const technicalSignals = [
    { name: 'RSI', signal: rsi > 70 ? 'sell' : rsi < 30 ? 'buy' : 'neutral', detail: `RSI ${rsi}，${rsi > 70 ? '超买区间，回调概率大' : rsi < 30 ? '超卖区间，反弹概率大' : '中性区间'}` },
    { name: 'MACD', signal: macdHist > 0 ? 'buy' : 'sell', detail: `MACD ${macdLine > 0 ? '零轴上方' : '零轴下方'}，柱状图${macdHist > 0 ? '正值（多头动能）' : '负值（空头动能）'}` },
    { name: 'EMA20', signal: last > ema20 ? 'buy' : 'sell', detail: last > ema20 ? `股价站上EMA20（$${ema20.toFixed(2)}）` : `股价跌破EMA20（$${ema20.toFixed(2)}）` },
    { name: 'SMA50', signal: last > sma50 ? 'buy' : 'sell', detail: last > sma50 ? '股价站上50日均线' : '股价跌破50日均线' },
    { name: '布林带', signal: bbPosition > 0.8 ? 'sell' : bbPosition < 0.2 ? 'buy' : 'neutral', detail: `布林带位置 ${(bbPosition*100).toFixed(0)}%，${bbPosition > 0.8 ? '接近上轨（超买）' : bbPosition < 0.2 ? '接近下轨（超卖）' : '中轨附近'}` },
    { name: '动量', signal: roc5 > 0 && roc10 > 0 ? 'buy' : roc5 < 0 && roc10 < 0 ? 'sell' : 'neutral', detail: `5日ROC ${roc5 > 0 ? '+' : ''}${roc5}%，10日ROC ${roc10 > 0 ? '+' : ''}${roc10}%` },
  ];

  const riskLevel = volFactor > 0.03 ? 'high' : volFactor > 0.015 ? 'medium' : 'low';

  // === Run Deep Analysis Modules ===
  const candlePatterns = detectCandlePatterns(candles);
  const volumeAnalysis = analyzeVolume(candles);
  const divergences = detectDivergences(closes, indicators);
  const fibonacci = calcFibonacci(closes);
  const regime = detectRegime(closes, indicators);
  const macro = analyzeMacro(macroData);
  const betaResult = calcBeta(closes, sp500Closes);
  const fundamentals = analyzeFundamentals(fundamentalsData, last);

  // Use Yahoo-provided beta if we couldn't calculate it
  const betaValue = betaResult?.beta ?? fundamentalsData?.beta ?? null;

  // Add pattern/divergence/macro/fundamental weights to score
  const patternScore = candlePatterns.reduce((a, p) => a + (p.weight || 0), 0);
  const divScore = divergences.reduce((a, d) => a + (d.weight || 0), 0);
  const deepScore = score + patternScore * 0.5 + divScore * 0.5 + macro.score * 0.3 + fundamentals.score * 0.4;
  const adjustedConfidence = Math.min(90, Math.max(20, confidence + Math.abs(patternScore + divScore) * 0.5 + (macro.score !== 0 ? 3 : 0) + (fundamentals.score !== 0 ? 2 : 0)));

  const trendText = trend === 'bullish' ? '多头趋势' : trend === 'bearish' ? '空头趋势' : '震荡格局';
  const scoreText = `综合评分 ${deepScore > 0 ? '+' : ''}${deepScore.toFixed(0)}`;
  const macroText = macro.environment !== '数据不可用' ? `宏观: ${macro.environment}。` : '';
  const fundText = fundamentals.rating !== '数据不可用' ? `${fundamentals.rating}。` : '';
  const betaText = betaValue != null ? `Beta ${betaValue}。` : '';
  const summary = `${ticker} 当前呈现${trendText}（${scoreText}），${regime.regime}。${macroText}${fundText}${betaText}RSI ${rsi}，MACD柱状图${macdHist > 0 ? '正值' : '负值'}。${candlePatterns.length > 0 ? 'K线: ' + candlePatterns.map(p=>p.name).join('、') + '。' : ''}${divergences.length > 0 ? divergences.map(d=>d.type).join('、') + '。' : ''}`;

  // Build deep analysis text
  const deepParts = [];
  deepParts.push(`【${ticker} 深度技术分析报告】\n当前价格: $${last.toFixed(2)} | 综合评分: ${deepScore > 0 ? '+' : ''}${deepScore.toFixed(0)}/100 | 市场状态: ${regime.regime}`);

  deepParts.push(`\n\n━━ 市场状态 ━━\n${regime.regimeDetail}\nADX趋势强度: ${regime.adx} | +DI: ${regime.plusDI} | -DI: ${regime.minusDI}\n布林带宽度: ${regime.bbWidth}% | ${regime.cross}`);

  deepParts.push(`\n\n━━ 核心指标 ━━\nRSI(14): ${rsi} — ${rsi > 70 ? '超买区间，回调概率增大' : rsi < 30 ? '超卖区间，反弹概率增大' : rsi > 55 ? '偏多区间' : rsi < 45 ? '偏空区间' : '中性'}\nMACD: 柱状图 ${macdHist > 0 ? '+' : ''}${macdHist.toFixed(3)} | 快线 ${macdLine.toFixed(3)} | 信号线 ${signalLine.toFixed(3)}\n布林带: 位置 ${(bbPosition*100).toFixed(0)}% | 上轨 $${bbUpper.toFixed(2)} | 中轨 $${ema20.toFixed(2)} | 下轨 $${bbLower.toFixed(2)}\n均线: EMA20 $${ema20.toFixed(2)} | SMA50 $${sma50.toFixed(2)} | SMA200 $${sma200.toFixed(2)}`);

  deepParts.push(`\n\n━━ 多时间框架动量 ━━\n5日: ${roc5 > 0 ? '+' : ''}${roc5}% | 10日: ${roc10 > 0 ? '+' : ''}${roc10}% | 20日: ${roc20 > 0 ? '+' : ''}${roc20}%\n${Math.sign(parseFloat(roc5)) === Math.sign(parseFloat(roc10)) && Math.sign(parseFloat(roc10)) === Math.sign(parseFloat(roc20)) ? '各时间框架动量方向一致，趋势确认度高' : '时间框架间存在分歧，趋势不够明确'}`);

  if (candlePatterns.length > 0) {
    deepParts.push('\n\n━━ K线形态识别 ━━');
    candlePatterns.forEach(p => deepParts.push(`${p.type === 'buy' ? '[多]' : p.type === 'sell' ? '[空]' : '[中]'} ${p.name}: ${p.detail}`));
  }

  if (divergences.length > 0) {
    deepParts.push('\n\n━━ 背离检测 ━━');
    divergences.forEach(d => deepParts.push(`${d.signal === 'buy' ? '[多]' : '[空]'} ${d.type}: ${d.detail}`));
  }

  if (volumeAnalysis.detail) {
    deepParts.push(`\n\n━━ 量价分析 ━━\n${volumeAnalysis.trend}: ${volumeAnalysis.detail}\n成交量比率（5日/20日均量）: ${volumeAnalysis.volumeRatio}x${volumeAnalysis.volumeRatio > 1.5 ? ' — 放量显著' : volumeAnalysis.volumeRatio < 0.7 ? ' — 严重缩量' : ''}`);
  }

  if (fibonacci) {
    deepParts.push(`\n\n━━ 斐波那契回撤 (${fibonacci.isUptrend ? '上升趋势' : '下降趋势'}) ━━\n区间: $${fibonacci.low.toFixed(2)} → $${fibonacci.high.toFixed(2)}`);
    fibonacci.levels.forEach(lv => {
      const dist = ((lv.price - last) / last * 100).toFixed(1);
      const marker = lv.label === fibonacci.nearest.label ? ' ◄ 最近' : '';
      deepParts.push(`  ${lv.label}: $${lv.price.toFixed(2)} (距当前 ${dist > 0 ? '+' : ''}${dist}%)${marker}`);
    });
  }

  // Beta section
  if (betaValue != null) {
    const betaDesc = betaValue > 1.5 ? '高波动（远超大盘）' : betaValue > 1.2 ? '较高波动' : betaValue > 0.8 ? '接近大盘' : betaValue > 0.5 ? '低波动（防御型）' : '极低波动';
    deepParts.push(`\n\n━━ Beta 系数 ━━\nBeta: ${betaValue} — ${betaDesc}${betaResult ? `\n与S&P500相关系数: ${betaResult.correlation} | 计算周期: ${betaResult.period}天` : ' (Yahoo Finance 提供)'}`);
    if (betaValue > 1.5) deepParts.push('高Beta意味着大盘跌1%时该股可能跌1.5%+，注意风险控制');
  }

  // Fundamentals section
  if (fundamentals.report) {
    deepParts.push(`\n\n━━ 基本面分析 (${fundamentals.rating}) ━━\n${fundamentals.report}\n基本面评分: ${fundamentals.score > 0 ? '+' : ''}${fundamentals.score}`);
  }

  if (macro.report) {
    deepParts.push(`\n\n━━ 宏观环境 (${macro.environment}) ━━\n${macro.report}\n宏观评分: ${macro.score > 0 ? '+' : ''}${macro.score}`);
  }

  deepParts.push(`\n\n━━ 风险评估 ━━\n波动率: ${(volFactor * 100).toFixed(2)}% | ATR: $${atr.toFixed(2)} | 风险等级: ${riskLevel === 'high' ? '高' : riskLevel === 'medium' ? '中' : '低'}${betaValue != null ? ` | Beta: ${betaValue}` : ''}\n${Math.abs(parseFloat(roc5)) > 5 ? '短期波动剧烈，注意仓位控制' : '短期波动正常'}`);

  deepParts.push(`\n\n━━ 操作建议 ━━`);
  if (trend === 'bullish' && regime.regime.includes('趋势')) {
    deepParts.push('趋势多头，可考虑顺势做多或持有。止损参考布林带下轨或EMA20。');
  } else if (trend === 'bearish' && regime.regime.includes('趋势')) {
    deepParts.push('趋势空头，建议观望或轻仓。反弹至EMA20附近可考虑减仓。');
  } else if (regime.regime === '低波动盘整') {
    deepParts.push('盘整蓄势期，关注突破方向。可在布林带上下轨之间高抛低吸，突破后顺势跟进。');
  } else if (regime.regime === '高波动') {
    deepParts.push('高波动期间风险极大，建议降低仓位。等待波动率回落后再入场。');
  } else {
    deepParts.push('震荡市中以区间交易为主，支撑位附近轻仓试多，阻力位附近减仓。');
  }
  if (divergences.some(d => d.signal === 'buy')) deepParts.push('检测到底背离信号，关注反弹机会。');
  if (divergences.some(d => d.signal === 'sell')) deepParts.push('检测到顶背离信号，注意控制风险。');

  // Add deep analysis modules as additional technicalSignals
  const allSignals = [...technicalSignals];
  if (volumeAnalysis.detail) {
    allSignals.push({ name: '量价', signal: volumeAnalysis.signal, detail: `${volumeAnalysis.trend}: ${volumeAnalysis.detail}` });
  }
  candlePatterns.slice(0, 2).forEach(p => {
    allSignals.push({ name: p.name, signal: p.type, detail: p.detail });
  });
  divergences.slice(0, 2).forEach(d => {
    allSignals.push({ name: d.type, signal: d.signal, detail: d.detail });
  });
  macro.signals.slice(0, 4).forEach(s => allSignals.push(s));
  fundamentals.signals.slice(0, 3).forEach(s => allSignals.push(s));
  // Beta signal
  if (betaValue != null) {
    allSignals.push({ name: 'Beta', signal: betaValue > 1.3 ? 'sell' : betaValue < 0.8 ? 'buy' : 'neutral',
      detail: `Beta ${betaValue}${betaValue > 1.3 ? '，高波动风险' : betaValue < 0.8 ? '，防御型低波动' : '，接近大盘'}` });
  }

  // Build risk factors
  const totalFactors = 6 + candlePatterns.length + divergences.length + macro.signals.length + fundamentals.signals.length + (betaValue != null ? 1 : 0);
  const riskFactors = [
    `深度分析引擎 v3 + 宏观 + 基本面，共${totalFactors}项分析因子`,
    volFactor > 0.03 ? '近期波动率偏高，预测不确定性大' : volFactor > 0.015 ? '近期波动率中等' : '近期波动率正常',
    Math.abs(parseFloat(roc5)) > 5 ? `5日涨跌幅 ${roc5 > 0 ? '+' : ''}${roc5}%，短期波动剧烈` : '短期波动正常',
  ];
  if (regime.regime === '高波动') riskFactors.push('市场处于高波动状态，极端行情下技术分析可靠性降低');
  if (divergences.length > 0) riskFactors.push('检测到背离信号，趋势可能即将反转');
  if (macro.score < -5) riskFactors.push(`宏观环境不利（${macro.environment}），系统性风险上升`);
  if (macro.score > 5) riskFactors.push(`宏观环境有利（${macro.environment}），系统性风险偏低`);
  if (fundamentals.score < -5) riskFactors.push(`基本面偏弱（${fundamentals.rating}），注意价值陷阱`);
  if (betaValue != null && betaValue > 1.5) riskFactors.push(`Beta ${betaValue}，高波动股票，大盘回调时跌幅可能放大`);

  return {
    summary,
    trend,
    confidence: adjustedConfidence,
    predictions,
    support: Math.round(support * 100) / 100,
    resistance: Math.round(resistance * 100) / 100,
    technicalSignals: allSignals,
    riskLevel,
    riskFactors,
    analysis: deepParts.join('\n'),
    // Deep analysis extras for UI rendering
    deepAnalysis: {
      candlePatterns,
      volumeAnalysis,
      divergences,
      fibonacci,
      regime,
      macro,
      beta: betaValue,
      betaResult,
      fundamentals,
      score: deepScore,
    },
  };
}

async function startAIPrediction() {
  const ticker = (document.getElementById('ai-ticker')?.value || '').trim().toUpperCase();
  if (!ticker) { showToast('请输入股票代码'); return; }
  if (state.aiLoading) return;

  const apiKey = getAIApiKey();

  state.aiTicker = ticker;
  state.aiLoading = true;
  state.aiStatus = '获取历史数据...';
  state.aiResult = null;
  render();

  try {
    // Fetch ~1 year of daily data
    const candles = await fetchCandles(ticker, '1y', '1d');
    if (!candles || candles.length < 30) throw new Error('历史数据不足（需要至少30天）');

    const closes = candles.map(c => Number(c.close)).filter(v => !isNaN(v));
    if (closes.length < 30) throw new Error('有效价格数据不足');

    const dates = candles.map(c => {
      try { return new Date(c.time).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }); }
      catch { return ''; }
    });

    // Calc indicators
    const indicators = calcIndicators(closes);

    // Fetch macro data, fundamentals, and S&P 500 (for Beta) in parallel
    state.aiStatus = '获取宏观数据 + 基本面...';
    render();
    let macroData = null, fundamentalsData = null, sp500Closes = null;
    try {
      const [macroResult, fundResult, sp500Result] = await Promise.allSettled([
        fetchMacroData(),
        fetchFundamentals(ticker),
        fetchCandles('^GSPC', '1y', '1d').then(c => c.map(x => x.close)),
      ]);
      macroData = macroResult.status === 'fulfilled' ? macroResult.value : null;
      fundamentalsData = fundResult.status === 'fulfilled' ? fundResult.value : null;
      sp500Closes = sp500Result.status === 'fulfilled' ? sp500Result.value : null;
    } catch (e) { console.warn('Parallel fetch failed:', e); }

    let analysis = null;

    // Try Gemini API if key is provided
    if (apiKey) {
      state.aiStatus = 'Gemini AI 分析中...';
      render();

      try {
        const resp = await fetch('/api/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker, prices: closes, dates, indicators, apiKey }),
        });

        const data = await resp.json().catch(() => null);

        if (resp.ok && data && !data.parseError && data.analysis) {
          analysis = data.analysis;
        } else if (resp.status === 429) {
          console.warn('Gemini API quota exceeded, falling back to local analysis');
        } else if (data?.error) {
          console.warn('Gemini API error, falling back to local analysis:', data.error);
        }
      } catch (apiErr) {
        console.warn('Gemini API call failed, falling back to local analysis:', apiErr.message);
      }
    }

    // Use local technical analysis (primary method, or fallback if API failed)
    if (!analysis) {
      state.aiStatus = '深度技术分析中...';
      render();
      analysis = generateLocalAnalysis(ticker, closes, indicators, candles, macroData, fundamentalsData, sp500Closes);
    }

    state.aiResult = {
      ticker,
      lastPrice: closes[closes.length - 1],
      analysis,
      history: closes.slice(-60),
      historyDates: dates.slice(-60),
    };

    showToast(analysis.summary?.includes('本地技术分析') ? '本地分析完成（API配额已用尽）' : '分析完成 ✓');
  } catch (e) {
    console.error('AI prediction error:', e);
    showToast('分析失败: ' + e.message);
  }

  state.aiLoading = false;
  render();
}

      },
