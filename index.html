// ── Extended Technical Indicators ──
function calcExtendedIndicators(closes, highs, lows, volumes) {
  const n = closes.length;
  if (n < 30) return null;
  const last = closes[n - 1];

  // Stochastic Oscillator %K %D (14,3)
  const stochK_period = 14;
  let stochK = null, stochD = null;
  if (n >= stochK_period) {
    const highMax = Math.max(...highs.slice(-stochK_period));
    const lowMin  = Math.min(...lows.slice(-stochK_period));
    stochK = highMax !== lowMin ? ((last - lowMin) / (highMax - lowMin)) * 100 : 50;
    const kArr = [];
    for (let i = n - 3; i < n; i++) {
      const h = Math.max(...highs.slice(i - stochK_period + 1, i + 1));
      const l = Math.min(...lows.slice(i - stochK_period + 1, i + 1));
      kArr.push(h !== l ? ((closes[i] - l) / (h - l)) * 100 : 50);
    }
    stochD = kArr.reduce((a, b) => a + b, 0) / kArr.length;
  }

  // Williams %R (14)
  const wrPeriod = 14;
  let williamsR = null;
  if (n >= wrPeriod) {
    const hh = Math.max(...highs.slice(-wrPeriod));
    const ll  = Math.min(...lows.slice(-wrPeriod));
    williamsR = hh !== ll ? ((hh - last) / (hh - ll)) * -100 : -50;
  }

  // ADX (14) — simplified from TR/DM
  let adx = null;
  const adxP = 14;
  if (n >= adxP * 2) {
    const trArr = [], pmDM = [], nmDM = [];
    for (let i = 1; i < n; i++) {
      const tr  = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1]));
      const pdm = Math.max(highs[i] - highs[i-1], 0);
      const ndm = Math.max(lows[i-1] - lows[i], 0);
      trArr.push(tr);
      pmDM.push(pdm > ndm ? pdm : 0);
      nmDM.push(ndm > pdm ? ndm : 0);
    }
    const smTR  = trArr.slice(-adxP).reduce((a,b)=>a+b,0);
    const smPDM = pmDM.slice(-adxP).reduce((a,b)=>a+b,0);
    const smNDM = nmDM.slice(-adxP).reduce((a,b)=>a+b,0);
    if (smTR > 0) {
      const pDI = (smPDM / smTR) * 100;
      const nDI = (smNDM / smTR) * 100;
      const dx  = pDI + nDI > 0 ? (Math.abs(pDI - nDI) / (pDI + nDI)) * 100 : 0;
      adx = dx;
    }
  }

  // OBV (On-Balance Volume)
  let obv = 0;
  if (volumes && volumes.length === n) {
    for (let i = 1; i < n; i++) {
      if (closes[i] > closes[i-1]) obv += volumes[i];
      else if (closes[i] < closes[i-1]) obv -= volumes[i];
    }
  }

  // Momentum (10)
  const mom10 = n > 10 ? ((last / closes[n-11]) - 1) * 100 : 0;

  // Price position vs 52-week range
  const yearHigh = Math.max(...closes.slice(-Math.min(252, n)));
  const yearLow  = Math.min(...closes.slice(-Math.min(252, n)));
  const yearPos  = yearHigh !== yearLow ? (last - yearLow) / (yearHigh - yearLow) : 0.5;

  return { stochK, stochD, williamsR, adx, obv, mom10, yearHigh, yearLow, yearPos };
}

// ── Normalize / Denormalize ──
function normalizeSequence(data) {
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  return { normalized: data.map(v => (v - min) / range), min, max, range };
}

// ── Z-score normalization (no future leak) ──
function zScoreNormalize(data) {
  const mean = data.reduce((a,b) => a+b, 0) / data.length;
  const std = Math.sqrt(data.reduce((a,b) => a + (b-mean)**2, 0) / data.length) || 1;
  return { normalized: data.map(v => (v - mean) / std), mean, std };
}

// ── Quant statistical features (hedge fund grade) ──
function calcQuantFeatures(closes, i) {
  // Need at least 30 days of history
  if (i < 30) return { autocorr: 0, skew: 0, kurt: 0, hurst: 0.5, garch: 0, regime: 0 };

  // Rolling 20-day returns
  const rets = [];
  for (let j = i - 19; j <= i; j++) rets.push((closes[j] - closes[j-1]) / closes[j-1]);
  const n = rets.length;
  const mean = rets.reduce((a,b) => a+b, 0) / n;

  // 1. Autocorrelation (lag-1) — mean reversion vs momentum signal
  let num = 0, den = 0;
  for (let j = 1; j < n; j++) { num += (rets[j] - mean) * (rets[j-1] - mean); }
  for (let j = 0; j < n; j++) { den += (rets[j] - mean) ** 2; }
  const autocorr = den > 0 ? num / den : 0;

  // 2. Skewness — tail risk asymmetry
  const std = Math.sqrt(den / n) || 1e-8;
  let m3 = 0;
  for (let j = 0; j < n; j++) m3 += ((rets[j] - mean) / std) ** 3;
  const skew = m3 / n;

  // 3. Kurtosis — fat tail detection (excess kurtosis)
  let m4 = 0;
  for (let j = 0; j < n; j++) m4 += ((rets[j] - mean) / std) ** 4;
  const kurt = (m4 / n) - 3;

  // 4. Simplified Hurst exponent (R/S analysis, 20-day window)
  // H > 0.5 = trending, H < 0.5 = mean-reverting, H ≈ 0.5 = random walk
  const cumDev = [];
  let cumSum = 0;
  for (let j = 0; j < n; j++) { cumSum += rets[j] - mean; cumDev.push(cumSum); }
  const R = Math.max(...cumDev) - Math.min(...cumDev);
  const S = std * Math.sqrt(n);
  const hurst = S > 0 ? Math.log(R / S + 1e-8) / Math.log(n) : 0.5;

  // 5. GARCH-like volatility clustering (ratio of recent vol to older vol)
  const recentVol = Math.sqrt(rets.slice(-5).reduce((a,b) => a + (b-mean)**2, 0) / 5);
  const olderVol  = Math.sqrt(rets.slice(0, 10).reduce((a,b) => a + (b-mean)**2, 0) / 10);
  const garch = olderVol > 0 ? (recentVol / olderVol) - 1 : 0;

  // 6. Market regime (simple: based on vol + trend)
  // 0 = low vol uptrend, 1 = high vol uptrend, 2 = low vol downtrend, 3 = high vol downtrend
  const trend20 = (closes[i] - closes[i-20]) / closes[i-20];
  const isHighVol = recentVol > std * 1.2;
  const isUp = trend20 > 0;
  const regime = (isUp ? 0 : 2) + (isHighVol ? 1 : 0);

  return { autocorr, skew, kurt, hurst, garch, regime };
}

// ── Build feature matrix v3: hedge fund grade 21 features ──
function buildFeatureMatrix(closes, highs, lows, volumes) {
  const n = closes.length;
  const features = [];

  for (let i = 50; i < n; i++) {
    const slice   = closes.slice(0, i + 1);
    const hSlice  = highs.slice(0, i + 1);
    const lSlice  = lows.slice(0, i + 1);
    const vSlice  = volumes ? volumes.slice(0, i + 1) : null;
    const ind     = calcIndicators(slice);
    const ext     = calcExtendedIndicators(slice, hSlice, lSlice, vSlice);

    // Return features (safe division - guard against zero/NaN)
    const safeDiv = (a, b) => b !== 0 ? a / b : 0;
    const ret1  = safeDiv(closes[i] - closes[i-1], closes[i-1]);
    const ret5  = safeDiv(closes[i] - closes[i-5], closes[i-5]);
    const ret20 = safeDiv(closes[i] - closes[i-20], closes[i-20]);

    // Volatility (20-day rolling std of returns)
    const rets20 = [];
    for (let j = i-19; j <= i; j++) rets20.push(safeDiv(closes[j] - closes[j-1], closes[j-1]));
    const retMean = rets20.reduce((a,b)=>a+b,0) / 20;
    const vol20 = Math.sqrt(rets20.reduce((a,b)=>a+(b-retMean)**2, 0) / 20);

    // Price relative to MAs
    const sma20 = slice.slice(-20).reduce((a,b)=>a+b,0) / 20 || 1e-8;
    const sma50 = slice.slice(-50).reduce((a,b)=>a+b,0) / 50 || 1e-8;
    const priceToSMA20 = (closes[i] / sma20) - 1;
    const priceToSMA50 = (closes[i] / sma50) - 1;

    // Volume features
    let volRatio = 0, obvChange = 0;
    if (vSlice && vSlice.length > 20) {
      const avgVol = vSlice.slice(-20).reduce((a,b)=>a+b,0) / 20;
      volRatio = avgVol > 0 ? (vSlice[vSlice.length-1] / avgVol) - 1 : 0;
      // OBV 5-day change rate
      let obv1 = 0, obv2 = 0;
      for (let j = 1; j < vSlice.length; j++) {
        const d = closes[j] > closes[j-1] ? vSlice[j] : closes[j] < closes[j-1] ? -vSlice[j] : 0;
        if (j <= vSlice.length - 6) obv1 += d;
        obv2 += d;
      }
      obvChange = obv2 !== 0 ? ((obv2 - obv1) / Math.abs(obv2 || 1)) : 0;
    }

    // Technical indicators (bounded 0-1 or tanh-compressed)
    const rsi   = parseFloat(ind.rsi) / 100;
    const macdH = Math.tanh((parseFloat(ind.macdHist) || 0) / (closes[i] * 0.01));
    const bbPos = parseFloat(ind.bbPosition) || 0.5;
    const stK   = ext ? (ext.stochK || 50) / 100 : 0.5;
    const willR = ext ? ((ext.williamsR || -50) + 100) / 100 : 0.5;
    const adx   = ext ? Math.min((ext.adx || 0) / 60, 1) : 0.3;

    // High-low range relative to close
    const hlRange = closes[i] > 0 ? (highs[i] - lows[i]) / closes[i] : 0;

    // Quant statistical features (hedge fund grade)
    const qf = calcQuantFeatures(closes, i);

    const row = [
      Math.tanh(ret1 * 20),          // 0:  1d return (compressed)
      Math.tanh(ret5 * 10),          // 1:  5d return
      Math.tanh(ret20 * 5),          // 2:  20d return
      Math.min(vol20 * 30, 1),       // 3:  realized volatility
      Math.tanh(priceToSMA20 * 10),  // 4:  price/SMA20 distance
      Math.tanh(priceToSMA50 * 10),  // 5:  price/SMA50 distance
      rsi,                           // 6:  RSI
      macdH,                         // 7:  MACD histogram
      bbPos,                         // 8:  Bollinger position
      stK,                           // 9:  Stochastic %K
      willR,                         // 10: Williams %R
      adx,                           // 11: ADX
      Math.tanh(volRatio),           // 12: volume ratio
      Math.tanh(obvChange * 5),      // 13: OBV change
      Math.min(hlRange * 20, 1),     // 14: high-low range
      // ── Hedge fund quant features ──
      Math.tanh(qf.autocorr * 3),    // 15: autocorrelation (momentum/mean-reversion)
      Math.tanh(qf.skew),            // 16: return skewness (tail risk)
      Math.tanh(qf.kurt / 5),        // 17: excess kurtosis (fat tails)
      Math.min(Math.max(qf.hurst, 0), 1), // 18: Hurst exponent (trending vs reverting)
      Math.tanh(qf.garch),           // 19: GARCH vol clustering
      qf.regime / 3,                 // 20: market regime (0-1 encoded)
    ];
    // Sanitize: replace NaN/Infinity with 0
    for (let fi = 0; fi < row.length; fi++) {
      if (!Number.isFinite(row[fi])) row[fi] = 0;
    }
    features.push(row);
  }
  return features;
}

// ── Build sequences: multi-horizon targets (1d, 5d, 20d returns) ──
function buildSequences(features, lookback) {
  const X = [], Y1 = [], Y5 = [], Y20 = [];
  // We need at least 20 steps ahead for the 20d target
  for (let i = lookback; i < features.length - 20; i++) {
    X.push(features.slice(i - lookback, i));
    Y1.push(features[i][0]);       // next 1d compressed return
    Y5.push(features[i + 4][1]);   // 5d compressed return (safe: loop ends at length-20)
    Y20.push(features[i + 19][2]); // 20d compressed return (safe: loop ends at length-20)
  }
  return { X, Y1, Y5, Y20 };
}

// ── Conv1D-Attention-LSTM Hybrid (hedge fund architecture) ──
// Pattern: Conv1D extracts local patterns → Attention weights → LSTM captures temporal
function buildLSTMModel(lookback, nFeatures) {
  const tf = window.tf;
  const input = tf.input({ shape: [lookback, nFeatures] });

  // Conv1D feature extraction + attention (lightweight for browser)
  const conv3 = tf.layers.conv1d({ filters: 24, kernelSize: 3, padding: 'same', activation: 'relu' }).apply(input);
  const conv5 = tf.layers.conv1d({ filters: 24, kernelSize: 5, padding: 'same', activation: 'relu' }).apply(input);
  const convCat = tf.layers.concatenate().apply([conv3, conv5]);  // [batch, lookback, 48]

  // Attention scoring
  const attnScore = tf.layers.dense({ units: 1, activation: 'sigmoid' }).apply(convCat);
  const attended = tf.layers.multiply().apply([convCat, attnScore]);

  // LSTM
  let x = tf.layers.lstm({ units: 64, returnSequences: false }).apply(attended);
  x = tf.layers.dropout({ rate: 0.2 }).apply(x);

  // Residual from raw features
  const rawPool = tf.layers.globalAveragePooling1d().apply(input);
  const fused = tf.layers.concatenate().apply([x, rawPool]);

  const shared = tf.layers.dense({ units: 32, activation: 'relu' }).apply(fused);
  const sharedDrop = tf.layers.dropout({ rate: 0.15 }).apply(shared);

  // 3 output heads
  const h1 = tf.layers.dense({ units: 12, activation: 'relu' }).apply(sharedDrop);
  const o1 = tf.layers.dense({ units: 1, activation: 'tanh', name: 'o1d' }).apply(h1);
  const h5 = tf.layers.dense({ units: 12, activation: 'relu' }).apply(sharedDrop);
  const o5 = tf.layers.dense({ units: 1, activation: 'tanh', name: 'o5d' }).apply(h5);
  const h20 = tf.layers.dense({ units: 12, activation: 'relu' }).apply(sharedDrop);
  const o20 = tf.layers.dense({ units: 1, activation: 'tanh', name: 'o20d' }).apply(h20);

  const out = tf.layers.concatenate().apply([o1, o5, o20]);
  const model = tf.model({ inputs: input, outputs: out });
  model.compile({
    optimizer: tf.train.adam(0.0005),
    loss: 'meanSquaredError',
  });
  return model;
}

// ── Conv1D-GRU with Residual (lighter second ensemble member) ──
function buildGRUModel(lookback, nFeatures) {
  const tf = window.tf;
  const input = tf.input({ shape: [lookback, nFeatures] });

  // Conv1D + GRU (lightweight)
  const conv = tf.layers.conv1d({ filters: 32, kernelSize: 5, padding: 'same', activation: 'relu' }).apply(input);
  let fwd = tf.layers.gru({ units: 48, returnSequences: false }).apply(conv);
  fwd = tf.layers.dropout({ rate: 0.2 }).apply(fwd);

  // Residual from raw features
  const rawPool = tf.layers.globalAveragePooling1d().apply(input);
  const fused = tf.layers.concatenate().apply([fwd, rawPool]);

  const shared = tf.layers.dense({ units: 32, activation: 'relu' }).apply(fused);
  const sharedDrop = tf.layers.dropout({ rate: 0.1 }).apply(shared);

  const h1 = tf.layers.dense({ units: 16, activation: 'relu' }).apply(sharedDrop);
  const o1 = tf.layers.dense({ units: 1, activation: 'tanh', name: 'g1d' }).apply(h1);
  const h5 = tf.layers.dense({ units: 16, activation: 'relu' }).apply(sharedDrop);
  const o5 = tf.layers.dense({ units: 1, activation: 'tanh', name: 'g5d' }).apply(h5);
  const h20 = tf.layers.dense({ units: 16, activation: 'relu' }).apply(sharedDrop);
  const o20 = tf.layers.dense({ units: 1, activation: 'tanh', name: 'g20d' }).apply(h20);

  const out = tf.layers.concatenate().apply([o1, o5, o20]);
  const model = tf.model({ inputs: input, outputs: out });
  model.compile({
    optimizer: tf.train.adam(0.0005),
    loss: 'meanSquaredError',
  });
  return model;
}

// ── Helper: decompress tanh-encoded return ──
function decompressReturn(tanhVal, scale) {
  if (!scale || !Number.isFinite(tanhVal)) return 0;
  const r = Math.atanh(Math.max(-0.99, Math.min(0.99, tanhVal))) / scale;
  return Number.isFinite(r) ? r : 0;
}

// ── Main DL prediction runner v3: multi-horizon (1d/1w/1m) ──
async function runDLPrediction() {
  const input = document.getElementById('dl-ticker');
  const ticker = (input ? input.value : state.dlTicker).trim().toUpperCase();
  if (!ticker) { showToast('请输入股票代码'); return; }

  state.dlTicker  = ticker;
  state.dlLoading = true;
  state.dlStatus  = '获取实时数据中...';
  state.dlProgress = 5;
  state.dlEpochLog = [];
  state.dlResult   = null;
  render();

  try {
    // 1. Fetch 1 year of daily data (faster, sufficient for training)
    const raw = await stockAPI(ticker, '1y', '1d');
    const q   = raw.indicators?.quote?.[0] || {};
    const ts  = raw.timestamp || [];

    // Synchronized filtering: all arrays must use the same valid indices
    const rawClose = q.close || [];
    const rawHigh  = q.high  || [];
    const rawLow   = q.low   || [];
    const rawVol   = q.volume || [];
    const validIdx = [];
    for (let i = 0; i < rawClose.length; i++) {
      if (rawClose[i] != null && rawHigh[i] != null && rawLow[i] != null) validIdx.push(i);
    }
    const closes  = validIdx.map(i => rawClose[i]);
    const highs   = validIdx.map(i => rawHigh[i]);
    const lows    = validIdx.map(i => rawLow[i]);
    const volumes = validIdx.map(i => rawVol[i] || 0);
    const dates   = validIdx.map(i => ts[i] ? new Date(ts[i] * 1000).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }) : '');

    if (closes.length < 100) throw new Error('历史数据不足（需要至少100天）');

    const lastPrice = closes[closes.length - 1];
    const meta      = raw.meta || {};
    const currency  = meta.currency || 'USD';

    // 2. Compute indicators
    state.dlStatus  = '计算技术指标 (15特征)...';
    state.dlProgress = 12;
    render();

    const indicators = calcIndicators(closes);
    const extended   = calcExtendedIndicators(closes, highs, lows, volumes);

    // 3. Build feature matrix
    state.dlStatus  = '构建特征矩阵 (多周期收益率+量能+技术指标)...';
    state.dlProgress = 20;
    render();

    const LOOKBACK  = 30;
    const features  = buildFeatureMatrix(closes, highs, lows, volumes);
    const { X, Y1, Y5, Y20 } = buildSequences(features, LOOKBACK);

    if (X.length < 60) throw new Error('数据序列不足，请换股票');

    // 4. Load TF.js if needed
    if (!window.tf) {
      state.dlStatus = '加载 TensorFlow.js...';
      state.dlProgress = 25;
      render();
      const ok = await loadTensorFlow();
      if (!ok) throw new Error('TensorFlow.js 加载失败，请检查网络');
    }

    const tf = window.tf;

    // 5. Prepare tensors — multi-output Y = [Y1, Y5, Y20] concatenated
    state.dlStatus  = '准备训练数据 (3-horizon targets)...';
    state.dlProgress = 30;
    render();

    // Purged split: 80% train, gap of 5 days, then validation (prevent leakage)
    const PURGE_GAP = 5;
    const splitIdx = Math.floor(X.length * 0.8);
    const valStart = Math.min(splitIdx + PURGE_GAP, X.length);
    const valSize  = X.length - valStart;

    if (valSize < 10) throw new Error('验证集不足');

    // Combine Y targets into [N, 3] shape
    const YtrainArr = Y1.slice(0, splitIdx).map((v, i) => [v, Y5[i], Y20[i]]);
    const YvalArr   = Y1.slice(valStart).map((v, i) => [v, Y5[valStart + i], Y20[valStart + i]]);

    // Exponential sample weights: recent samples are more important (hedge fund standard)
    const DECAY = 0.005;  // ~half-life of 140 days
    const sampleWeights = [];
    for (let i = 0; i < splitIdx; i++) {
      sampleWeights.push(Math.exp(DECAY * (i - splitIdx)));  // exponential decay, max=1 at end
    }

    // Light data augmentation: 1 noise copy (keeps memory manageable)
    state.dlStatus  = '数据增强...';
    state.dlProgress = 32;
    render();

    const augX = [...X.slice(0, splitIdx)];
    const augY = [...YtrainArr];
    const augW = [...sampleWeights];
    const NOISE_STD = 0.015;

    for (let i = 0; i < splitIdx; i++) {
      const noisySeq = X[i].map(row =>
        row.map(v => v + (Math.random() - 0.5) * 2 * NOISE_STD)
      );
      augX.push(noisySeq);
      augY.push(YtrainArr[i]);
      augW.push(sampleWeights[i] * 0.6);
    }

    let Xtrain, Ytrain, Wt, Xval, Yval, lstm, gru;
    Xtrain = tf.tensor3d(augX);
    Ytrain = tf.tensor2d(augY);
    Wt     = tf.tensor1d(augW);
    Xval   = tf.tensor3d(X.slice(valStart));
    Yval   = tf.tensor2d(YvalArr);

    // 6. Train Conv1D-Attention-LSTM with early stopping + sample weights
    state.dlStatus  = 'Conv1D-Attention-LSTM 训练中...';
    state.dlProgress = 35;
    render();

    const LSTM_EPOCHS = 35;
    lstm = buildLSTMModel(LOOKBACK, features[0].length);
    const lstmLog = [];
    let lstmBestValLoss = Infinity, lstmPatience = 0, lstmBestWeights = null;

    await lstm.fit(Xtrain, Ytrain, {
      epochs: LSTM_EPOCHS,
      batchSize: 64,
      validationData: [Xval, Yval],
      sampleWeight: Wt,
      shuffle: true,
      callbacks: {
        onEpochEnd: async (epoch, logs) => {
          const vl = logs.val_loss || 0;
          const line = `LSTM ${epoch+1}/${LSTM_EPOCHS} — loss: ${logs.loss.toFixed(6)}  val: ${vl.toFixed(6)}${vl < lstmBestValLoss ? ' ★' : ''}`;
          lstmLog.push(line);
          state.dlEpochLog = lstmLog.slice(-12);
          state.dlProgress = 35 + Math.round((epoch + 1) / LSTM_EPOCHS * 25);
          state.dlStatus   = line;
          render();
          if (vl < lstmBestValLoss) {
            lstmBestValLoss = vl;
            lstmPatience = 0;
            if (lstmBestWeights) lstmBestWeights.forEach(w => w.dispose());
            lstmBestWeights = lstm.getWeights().map(w => w.clone());
          } else {
            lstmPatience++;
            if (lstmPatience >= 10) lstm.stopTraining = true;
          }
        }
      }
    });
    if (lstmBestWeights) { lstm.setWeights(lstmBestWeights); lstmBestWeights.forEach(w => w.dispose()); }

    // 7. Train GRU with early stopping
    state.dlStatus  = 'Conv1D-GRU 多周期训练中...';
    state.dlProgress = 60;
    render();

    const GRU_EPOCHS = 30;
    gru = buildGRUModel(LOOKBACK, features[0].length);
    const gruLog = [];
    let gruBestValLoss = Infinity, gruPatience = 0, gruBestWeights = null;

    await gru.fit(Xtrain, Ytrain, {
      epochs: GRU_EPOCHS,
      batchSize: 64,
      validationData: [Xval, Yval],
      sampleWeight: Wt,
      shuffle: true,
      callbacks: {
        onEpochEnd: async (epoch, logs) => {
          const vl = logs.val_loss || 0;
          const line = `GRU ${epoch+1}/${GRU_EPOCHS} — loss: ${logs.loss.toFixed(6)}  val: ${vl.toFixed(6)}${vl < gruBestValLoss ? ' ★' : ''}`;
          gruLog.push(line);
          state.dlEpochLog = [...lstmLog.slice(-6), ...gruLog.slice(-6)];
          state.dlProgress = 60 + Math.round((epoch + 1) / GRU_EPOCHS * 20);
          state.dlStatus   = line;
          render();
          if (vl < gruBestValLoss) {
            gruBestValLoss = vl;
            gruPatience = 0;
            if (gruBestWeights) gruBestWeights.forEach(w => w.dispose());
            gruBestWeights = gru.getWeights().map(w => w.clone());
          } else {
            gruPatience++;
            if (gruPatience >= 10) gru.stopTraining = true;
          }
        }
      }
    });
    if (gruBestWeights) { gru.setWeights(gruBestWeights); gruBestWeights.forEach(w => w.dispose()); }

    // 8. Weighted ensemble
    const lstmWeight = gruBestValLoss / (lstmBestValLoss + gruBestValLoss);
    const gruWeight  = lstmBestValLoss / (lstmBestValLoss + gruBestValLoss);

    // 9. Direct multi-horizon prediction from current features
    state.dlStatus  = `生成多周期预测 (LSTM ${(lstmWeight*100).toFixed(0)}% + GRU ${(gruWeight*100).toFixed(0)}%)...`;
    state.dlProgress = 82;
    render();

    const seedT = tf.tensor3d([features.slice(-LOOKBACK)]);
    const lstmPred = await lstm.predict(seedT).data();
    const gruPred  = await gru.predict(seedT).data();
    seedT.dispose();

    // Output is [1d_ret, 5d_ret, 20d_ret] — decompress from tanh
    const horizons = [
      { label: '1天', scale: 20, li: 0 },
      { label: '1周', scale: 10, li: 1 },
      { label: '1月', scale: 5,  li: 2 },
    ];

    const predictions = horizons.map(h => {
      const lRet = decompressReturn(lstmPred[h.li], h.scale);
      const gRet = decompressReturn(gruPred[h.li], h.scale);
      const ensRet = lRet * lstmWeight + gRet * gruWeight;
      return {
        horizon: h.label,
        lstmPrice:  lastPrice * (1 + lRet),
        gruPrice:   lastPrice * (1 + gRet),
        ensPrice:   lastPrice * (1 + ensRet),
        ensReturn:  ensRet * 100,
        lstmReturn: lRet * 100,
        gruReturn:  gRet * 100,
      };
    });

    // Also do 5-day autoregressive for chart (day-by-day)
    const lstmDays = [], gruDays = [], ensembleDays = [];
    let lstmSeed = features.slice(-LOOKBACK).map(r => [...r]);
    let gruSeed  = features.slice(-LOOKBACK).map(r => [...r]);
    let lPrice = lastPrice, gPrice = lastPrice;

    for (let day = 1; day <= 5; day++) {
      const lT = tf.tensor3d([lstmSeed]);
      const gT = tf.tensor3d([gruSeed]);
      const lP = await lstm.predict(lT).data();
      const gP = await gru.predict(gT).data();
      lT.dispose(); gT.dispose();

      const lRet = decompressReturn(lP[0], 20);
      const gRet = decompressReturn(gP[0], 20);
      lPrice *= (1 + lRet); gPrice *= (1 + gRet);
      lstmDays.push(lPrice); gruDays.push(gPrice);
      ensembleDays.push(lPrice * lstmWeight + gPrice * gruWeight);

      const newL = [...lstmSeed[lstmSeed.length-1]]; newL[0] = lP[0];
      lstmSeed = [...lstmSeed.slice(1), newL];
      const newG = [...gruSeed[gruSeed.length-1]]; newG[0] = gP[0];
      gruSeed = [...gruSeed.slice(1), newG];
    }

    // 10. Validation metrics per horizon
    state.dlStatus = '计算多周期验证指标...';
    state.dlProgress = 90;
    render();

    const predValL = lstm.predict(Xval);
    const predValG = gru.predict(Xval);
    const pArrL = await predValL.data();
    const pArrG = await predValG.data();
    predValL.dispose(); predValG.dispose();

    // Per-horizon direction accuracy
    const horizonMetrics = [0, 1, 2].map(hi => {
      let dirOK = 0, total = 0, mse = 0;
      const YArr = [Y1, Y5, Y20][hi];
      for (let i = 0; i < valSize; i++) {
        const lv = pArrL[i * 3 + hi];
        const gv = pArrG[i * 3 + hi];
        const ensP = lv * lstmWeight + gv * gruWeight;
        const actual = YArr[valStart + i];
        mse += (ensP - actual) ** 2;
        const predSign = ensP > 0 ? 1 : -1;
        const actSign  = actual > 0 ? 1 : -1;
        if (predSign === actSign) dirOK++;
        total++;
      }
      return { dirAcc: total > 0 ? dirOK / total * 100 : 0, rmse: Math.sqrt(mse / valSize) };
    });

    // 11. Cleanup tensors
    [Xtrain, Ytrain, Wt, Xval, Yval].forEach(t => { if (t) t.dispose(); });
    [lstm, gru].forEach(m => { if (m) m.dispose(); });

    // 12. Assemble result
    state.dlProgress = 100;
    state.dlStatus   = '完成';
    state.dlResult = {
      ticker, lastPrice, currency, indicators, extended,
      predictions,       // [{horizon, lstmPrice, gruPrice, ensPrice, ensReturn, ...}]
      horizonMetrics,    // [{dirAcc, rmse}] for 1d, 5d, 20d
      lstmDays, gruDays, ensembleDays,  // 5-day autoregressive for chart
      lstmWeight, gruWeight,
      lstmBestValLoss, gruBestValLoss,
      history: closes.slice(-60),
      historyDates: dates.slice(-60),
      trainSize: splitIdx,
      totalSeq: X.length,
      nFeatures: features[0].length,
    };

    const d1 = horizonMetrics[0].dirAcc.toFixed(1);
    const d5 = horizonMetrics[1].dirAcc.toFixed(1);
    const d20 = horizonMetrics[2].dirAcc.toFixed(1);
    showToast(`${ticker} 预测完成 ✓ 方向准确率: 1d=${d1}% 1w=${d5}% 1m=${d20}%`);
  } catch (e) {
    console.error('DL error:', e);
    showToast('预测失败: ' + e.message);
    state.dlStatus = '错误: ' + e.message;
    // Cleanup any leaked tensors
    if (window.tf) { try { window.tf.disposeVariables(); } catch(_) {} }
  }

  state.dlLoading = false;
  render();
}

// ── DL Backtest v3: multi-horizon walk-forward on specified tickers ──
async function runDLBacktest() {
  const tickers = ['MU','SNDK','NVDA','GOOG'];
  state.dlBacktestLoading = true;
  state.dlBacktest = null;
  state.dlStatus = '回测初始化 (MU/SNDK/NVDA/GOOG)...';
  state.dlProgress = 2;
  state.dlEpochLog = [];
  render();

  const results = [];

  if (!window.tf) {
    state.dlStatus = '加载 TensorFlow.js...';
    render();
    const ok = await loadTensorFlow();
    if (!ok) { showToast('TF.js 加载失败'); state.dlBacktestLoading = false; render(); return; }
  }
  const tf = window.tf;

  for (let ti = 0; ti < tickers.length; ti++) {
    const ticker = tickers[ti];
    state.dlStatus = `回测 ${ticker} (${ti+1}/${tickers.length})...`;
    state.dlProgress = Math.round((ti / tickers.length) * 90);
    render();

    try {
      const raw = await stockAPI(ticker, '1y', '1d');
      const q   = raw.indicators?.quote?.[0] || {};
      const rawC = q.close || [], rawH = q.high || [], rawL = q.low || [], rawV = q.volume || [];
      const vi = [];
      for (let i = 0; i < rawC.length; i++) { if (rawC[i] != null && rawH[i] != null && rawL[i] != null) vi.push(i); }
      const closes = vi.map(i => rawC[i]), highs = vi.map(i => rawH[i]), lows = vi.map(i => rawL[i]), volumes = vi.map(i => rawV[i] || 0);

      if (closes.length < 120) { console.warn(`${ticker}: insufficient data`); continue; }

      const LOOKBACK = 30;
      const features = buildFeatureMatrix(closes, highs, lows, volumes);
      const { X, Y1, Y5, Y20 } = buildSequences(features, LOOKBACK);
      if (X.length < 80) continue;

      // Purged walk-forward: 70% train, 5-day gap, rest test
      const splitIdx = Math.floor(X.length * 0.7);
      const PURGE = 5;
      const testStart = Math.min(splitIdx + PURGE, X.length);
      const testSize = X.length - testStart;
      if (testSize < 10) continue;

      const YtrainArr = Y1.slice(0, splitIdx).map((v, i) => [v, Y5[i], Y20[i]]);
      const YtestArr  = Y1.slice(testStart).map((v, i) => [v, Y5[testStart+i], Y20[testStart+i]]);

      // Sample weights (exponential decay)
      const wArr = [];
      for (let i = 0; i < splitIdx; i++) wArr.push(Math.exp(0.005 * (i - splitIdx)));

      const Xtrain = tf.tensor3d(X.slice(0, splitIdx));
      const Ytrain = tf.tensor2d(YtrainArr);
      const WtBt   = tf.tensor1d(wArr);
      const Xtest  = tf.tensor3d(X.slice(testStart));
      const YtestT = tf.tensor2d(YtestArr);

      // Train Conv1D-Attention-LSTM with early stopping
      const model = buildLSTMModel(LOOKBACK, features[0].length);
      let bestValLoss = Infinity, patience = 0, bestWeights = null;
      const btLog = [];

      await model.fit(Xtrain, Ytrain, {
        epochs: 25, batchSize: 32, validationData: [Xtest, YtestT], sampleWeight: WtBt, shuffle: true,
        callbacks: {
          onEpochEnd: async (epoch, logs) => {
            const vl = logs.val_loss || Infinity;
            const line = `${ticker} E${epoch+1} — loss: ${logs.loss.toFixed(6)} val: ${vl.toFixed(6)}${vl < bestValLoss ? ' ★' : ''}`;
            btLog.push(line);
            state.dlEpochLog = btLog.slice(-8);
            render();
            if (vl < bestValLoss) {
              bestValLoss = vl;
              patience = 0;
              if (bestWeights) bestWeights.forEach(w => w.dispose());
              bestWeights = model.getWeights().map(w => w.clone());
            } else {
              patience++;
              if (patience >= 8) model.stopTraining = true;
            }
          }
        }
      });
      if (bestWeights) { model.setWeights(bestWeights); bestWeights.forEach(w => w.dispose()); }

      // Predict on test set — output is [1d, 5d, 20d]
      const predTensor = model.predict(Xtest);
      const predArr = await predTensor.data();
      predTensor.dispose();

      // Calc per-horizon metrics
      const horizonLabels = ['1d', '1w', '1m'];
      const YArrays = [Y1, Y5, Y20];
      const hMetrics = [0, 1, 2].map(hi => {
        let dirOK = 0, total = 0, mse = 0, mae = 0;
        const YAct = YArrays[hi];
        for (let i = 0; i < testSize; i++) {
          const pred = predArr[i * 3 + hi];
          const act  = YAct[testStart + i];
          const err = pred - act;
          mse += err * err;
          mae += Math.abs(err);
          if ((pred > 0) === (act > 0)) dirOK++;
          total++;
        }
        mse /= testSize; mae /= testSize;
        return {
          horizon: horizonLabels[hi],
          dirAcc: total > 0 ? dirOK / total * 100 : 0,
          rmse: Math.sqrt(mse),
          mae,
        };
      });

      results.push({
        ticker,
        lastPrice: closes[closes.length - 1],
        testSize,
        horizons: hMetrics,
        avgDirAcc: hMetrics.reduce((s, h) => s + h.dirAcc, 0) / 3,
      });

      // Cleanup
      Xtrain.dispose(); Ytrain.dispose(); WtBt.dispose(); Xtest.dispose(); YtestT.dispose(); model.dispose();
    } catch (e) {
      console.warn(`Backtest ${ticker} failed:`, e);
    }
  }

  // Summary
  const n = results.length || 1;
  const avgDir1d = results.reduce((s, r) => s + r.horizons[0].dirAcc, 0) / n;
  const avgDir5d = results.reduce((s, r) => s + r.horizons[1].dirAcc, 0) / n;
  const avgDir20d = results.reduce((s, r) => s + r.horizons[2].dirAcc, 0) / n;
  const avgDirAll = results.reduce((s, r) => s + r.avgDirAcc, 0) / n;

  state.dlBacktest = { results, avgDir1d, avgDir5d, avgDir20d, avgDirAll };
  state.dlBacktestLoading = false;
  state.dlProgress = 100;
  state.dlStatus = '回测完成';
  state.dlEpochLog = [];
  showToast(`回测完成: ${results.length}只 · 1d=${avgDir1d.toFixed(1)}% 1w=${avgDir5d.toFixed(1)}% 1m=${avgDir20d.toFixed(1)}%`);
  render();
}

      </div>`;
  })() : '';

  return `
    <div class="section-header">
      <div class="section-title">深度学习预测</div>
      <span class="dl-badge">Conv-Attention-LSTM/GRU · 21特征 · 对冲基金级</span>
    </div>

    <div class="dl-panel">
      <div style="font-size:11px;color:var(--text-3);margin-bottom:12px;">
        Conv1D多尺度特征 → 注意力加权 → LSTM/GRU · 21维特征含自相关/偏度/峰度/Hurst/GARCH/市场体制 · 指数衰减样本权重 + 噪声增强 · Purged CV 防泄漏
      </div>
      <div class="market-bar">
        <input class="form-input" id="dl-ticker" placeholder="输入股票代码，如 NVDA" value="${esc(state.dlTicker)}"
          onkeydown="if(event.key==='Enter')runDLPrediction()" />
        <button class="add-btn" onclick="runDLPrediction()" ${state.dlLoading ? 'disabled style="opacity:0.5"' : ''}>
          ${state.dlLoading ? '训练中...' : '⊞ 开始预测'}
        </button>
        <button class="add-btn" onclick="runDLBacktest()" ${state.dlBacktestLoading || state.dlLoading ? 'disabled style="opacity:0.5"' : ''} style="background:var(--bg-3);border:1px solid var(--border);">
          ${state.dlBacktestLoading ? '回测中...' : '◈ 模型回测'}
        </button>
      </div>
      <div class="watchlist" style="margin-top:10px;">
        ${quickTickers.map(t => `<button class="watchlist-btn" onclick="document.getElementById('dl-ticker').value='${t}';runDLPrediction()">${t}</button>`).join('')}
      </div>
      ${statusBlock}
    </div>

    ${resultBlock}
    ${renderDLBacktest()}
  `;
}

// ── renderDLBacktest ──
function renderDLBacktest() {
  const bt = state.dlBacktest;
  if (!bt) return '';

  const fmt = (v, d=2) => v != null ? Number(v).toFixed(d) : '—';
  const dc = v => v >= 55 ? 'var(--green)' : v >= 45 ? 'var(--amber)' : 'var(--red)';

  const cards = bt.results.map(r => {
    const hRows = r.horizons.map(h => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:11px;font-weight:600;color:var(--text-2);">${h.horizon}</span>
        <span style="font-size:13px;font-weight:700;color:${dc(h.dirAcc)};">${fmt(h.dirAcc, 1)}%</span>
        <span style="font-size:10px;color:var(--text-3);">RMSE ${fmt(h.rmse, 5)}</span>
      </div>`).join('');
    return `
      <div class="dl-bt-card">
        <div class="ticker-head">
          <span>${esc(r.ticker)}</span>
          <span style="font-size:11px;color:var(--text-3);font-weight:400;">$${fmt(r.lastPrice)} · ${r.testSize}样本</span>
        </div>
        ${hRows}
        <div style="margin-top:8px;text-align:center;">
          <span style="font-size:10px;color:var(--text-3);">平均方向</span>
          <span style="font-size:14px;font-weight:700;color:${dc(r.avgDirAcc)};margin-left:6px;">${fmt(r.avgDirAcc, 1)}%</span>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="dl-panel" style="margin-top:16px;">
      <div class="dl-header">
        <div style="font-size:12px;font-weight:600;color:var(--text-0);">◈ 多周期模型回测</div>
        <span class="dl-badge">Walk-Forward · MU/SNDK/NVDA/GOOG</span>
      </div>
      <div class="dl-bt-summary">
        <div class="dl-bt-metric">
          <div class="label">1天方向准确率</div>
          <div class="val" style="color:${dc(bt.avgDir1d)};">${fmt(bt.avgDir1d, 1)}%</div>
        </div>
        <div class="dl-bt-metric">
          <div class="label">1周方向准确率</div>
          <div class="val" style="color:${dc(bt.avgDir5d)};">${fmt(bt.avgDir5d, 1)}%</div>
        </div>
        <div class="dl-bt-metric">
          <div class="label">1月方向准确率</div>
          <div class="val" style="color:${dc(bt.avgDir20d)};">${fmt(bt.avgDir20d, 1)}%</div>
        </div>
        <div class="dl-bt-metric">
          <div class="label">综合平均</div>
          <div class="val" style="color:${dc(bt.avgDirAll)};">${fmt(bt.avgDirAll, 1)}%</div>
        </div>
      </div>
      <div class="dl-backtest-grid">${cards}</div>
      <div style="font-size:10px;color:var(--text-3);margin-top:10px;">
        * Walk-forward: 70%训练/30%测试 · LSTM v3 多输出 (1d/5d/20d) · 早停patience=8 · 方向准确率 = 预测涨跌符号正确率
      </div>
    </div>`;
}

// ── initDLCharts ──
function initDLCharts() {
  if (!window.Chart) return;
  if (!state.dlResult) return;
  const canvas = document.getElementById('dl-chart');
  if (!canvas) return;
  if (chartInstances['dl']) { chartInstances['dl'].destroy(); }

  const r = state.dlResult;
  const histLabels = r.historyDates;
  const predDayLabels = r.ensembleDays.map((_, i) => `D+${i+1}`);
  const allLabels = [...histLabels, ...predDayLabels];

  const histData  = [...r.history, ...new Array(5).fill(null)];
  const lstmLine  = [...new Array(r.history.length - 1).fill(null), r.lastPrice, ...r.lstmDays];
  const gruLine   = [...new Array(r.history.length - 1).fill(null), r.lastPrice, ...r.gruDays];
  const ensLine   = [...new Array(r.history.length - 1).fill(null), r.lastPrice, ...r.ensembleDays];

  chartInstances['dl'] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: allLabels,
      datasets: [
        { label: '历史收盘', data: histData, borderColor: '#00e5ff', backgroundColor: 'rgba(0,229,255,0.04)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.1 },
        { label: 'LSTM', data: lstmLine, borderColor: '#b388ff', borderWidth: 2, borderDash: [5,3], pointRadius: 3, pointBackgroundColor: '#b388ff', fill: false, tension: 0.2 },
        { label: 'GRU',  data: gruLine,  borderColor: '#ffab00', borderWidth: 2, borderDash: [5,3], pointRadius: 3, pointBackgroundColor: '#ffab00', fill: false, tension: 0.2 },
        { label: '集成',  data: ensLine,  borderColor: '#00e676', borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: '#00e676', fill: false, tension: 0.2 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, labels: { color: '#7b8ba8', font: { size: 10 } } },
        tooltip: { backgroundColor: '#0a1910', borderColor: '#1e442e', borderWidth: 1, titleColor: '#f0f4fc', bodyColor: '#c4cedf' },
      },
      scales: {
        x: { ticks: { color: '#4a5874', font: { size: 9 }, maxTicksLimit: 14 }, grid: { color: 'rgba(30,68,46,0.3)' } },
        y: { position: 'right', ticks: { color: '#7b8ba8', font: { size: 10 } }, grid: { color: 'rgba(30,68,46,0.3)' } },
      },
    },
  });

  // Scroll epoch log to bottom
  const log = document.getElementById('dl-epoch-log');
  if (log) log.scrollTop = log.scrollHeight;
}

// ══════════════════════════════════════════════
// PORTFOLIO TAB
// ══════════════════════════════════════════════
const ALLOC_COLORS = ['#00e5ff','#00e676','#ffab00','#b388ff','#ff5252','#40c4ff','#69f0ae','#ffd740','#ea80fc','#ff8a80'];

function renderPortfolio() {
  const e = state.editItem;
  // Calculate totals
  let totalValue = 0, totalCost = 0;
  state.holdings.forEach(h => {
    totalValue += (parseFloat(h.current_price) || 0) * (parseFloat(h.shares) || 0);
    totalCost += (parseFloat(h.avg_cost) || 0) * (parseFloat(h.shares) || 0);
  });
  const totalPnl = totalValue - totalCost;
  const totalPnlPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;

  const form = state.showForm === 'holding' ? `
    <div class="form-card">
      <div class="form-grid">
        <div>
          <label class="form-label">股票代码 *</label>
          <input class="form-input" id="f-h-ticker" placeholder="如 AAPL" value="${esc(e?.ticker||'')}" oninput="this.value=this.value.toUpperCase()"/>
        </div>
        <div>
          <label class="form-label">持有数量 *</label>
          <input class="form-input" id="f-h-shares" type="number" step="0.01" placeholder="如 100" value="${esc(e?.shares||'')}"/>
        </div>
        <div>
          <label class="form-label">平均成本 *</label>
          <input class="form-input" id="f-h-cost" type="number" step="0.01" placeholder="如 150.00" value="${esc(e?.avg_cost||'')}"/>
        </div>
        <div>
          <label class="form-label">当前价格</label>
          <input class="form-input" id="f-h-price" type="number" step="0.01" placeholder="留空可从API获取" value="${esc(e?.current_price||'')}"/>
        </div>
      </div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="cancelForm()">取消</button>
        <button class="save-btn" onclick="saveHolding()">${e?'更新':'添加'}</button>
      </div>
    </div>` : '';

  return `
    <div class="section-header">
      <div class="section-title">投资组合</div>
      <div style="display:flex;gap:8px;">
        ${state.holdings.length > 0 ? `<button class="export-btn" onclick="refreshAllHoldings()">↻ 刷新价格</button>` : ''}
        ${state.showForm!=='holding' ? '<button class="add-btn" onclick="openForm(\'holding\')">+ 添加持仓</button>' : ''}
      </div>
    </div>
    ${form}
    ${state.holdings.length > 0 ? `
      <div class="stats-grid">
        <div class="stat-card" style="border-left-color:var(--cyan)">
          <div class="stat-label">总市值</div>
          <div class="stat-value" style="color:var(--cyan)">$${totalValue.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
        </div>
        <div class="stat-card" style="border-left-color:${totalPnl>=0?'var(--green)':'var(--red)'}">
          <div class="stat-label">总盈亏</div>
          <div class="stat-value" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">
            ${totalPnl>=0?'+':''}$${totalPnl.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
          </div>
          <div class="stat-sub">${totalPnlPct>=0?'+':''}${totalPnlPct.toFixed(2)}%</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--amber)">
          <div class="stat-label">持仓数</div>
          <div class="stat-value" style="color:var(--amber)">${state.holdings.length}</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--purple)">
          <div class="stat-label">总成本</div>
          <div class="stat-value" style="color:var(--purple)">$${totalCost.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
        </div>
      </div>
      ${totalValue > 0 ? `
        <div class="dash-section" style="margin-bottom:16px;">
          <div class="dash-title">资产配置</div>
          <div class="alloc-bar">
            ${state.holdings.map((h, i) => {
              const val = (parseFloat(h.current_price)||0) * (parseFloat(h.shares)||0);
              const pct = totalValue > 0 ? (val / totalValue * 100) : 0;
              return `<div class="alloc-segment" style="width:${pct}%;background:${ALLOC_COLORS[i % ALLOC_COLORS.length]}"></div>`;
            }).join('')}
          </div>
          <div class="alloc-legend">
            ${state.holdings.map((h, i) => {
              const val = (parseFloat(h.current_price)||0) * (parseFloat(h.shares)||0);
              const pct = totalValue > 0 ? (val / totalValue * 100) : 0;
              return `<div class="alloc-legend-item"><div class="alloc-dot" style="background:${ALLOC_COLORS[i % ALLOC_COLORS.length]}"></div>${esc(h.ticker)} ${pct.toFixed(1)}%</div>`;
            }).join('')}
          </div>
          <div class="pie-container"><canvas id="portfolio-pie" width="280" height="280"></canvas></div>
        </div>
      ` : ''}
      <div class="holdings-list">
        ${state.holdings.map(h => {
          const shares = parseFloat(h.shares) || 0;
          const cost = parseFloat(h.avg_cost) || 0;
          const price = parseFloat(h.current_price) || 0;
          const mktVal = shares * price;
          const pnl = (price - cost) * shares;
          const pnlPct = cost > 0 ? ((price - cost) / cost * 100) : 0;
          return `
          <div class="holding-card">
            <div class="holding-row">
              <div class="holding-info">
                <span class="ticker">${esc(h.ticker)}</span>
                <span class="holding-shares">${shares} 股 · 成本 $${cost.toFixed(2)}</span>
              </div>
              <div class="holding-value">
                <div class="holding-mkt-val">$${mktVal.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
                <div class="holding-pnl" style="color:${pnl>=0?'var(--green)':'var(--red)'}">
                  ${pnl>=0?'+':''}$${pnl.toFixed(2)} (${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%)
                </div>
              </div>
            </div>
            <div class="card-footer">
              <span class="card-date">现价 $${price.toFixed(2)} · ${fmtDate(h.created_at)}</span>
              <div>
                <button class="icon-btn" onclick="editItem('holdings','${h.id}')">✎</button>
                <button class="icon-btn" onclick="doDelete('holdings','${h.id}')">✕</button>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    ` : `
      <div class="empty-state">
        <span class="empty-icon">◎</span>
        <p>还没有持仓记录</p>
        <p class="empty-hint">点击「+ 添加持仓」开始管理你的投资组合</p>
      </div>
    `}
  `;
}

async function saveHolding() {
  const ticker = (document.getElementById('f-h-ticker')?.value || '').trim().toUpperCase();
  const shares = document.getElementById('f-h-shares')?.value;
  const avg_cost = document.getElementById('f-h-cost')?.value;
  let current_price = document.getElementById('f-h-price')?.value;
  if (!ticker || !shares || !avg_cost) { showToast('请填写必要字段'); return; }

  // Auto-fetch current price if not provided
  if (!current_price && getFinnhubKey()) {
    try {
      const q = await fetchQuote(ticker);
      current_price = q.price;
    } catch(e) { current_price = avg_cost; }
  }
  if (!current_price) current_price = avg_cost;

  const row = { ticker, shares, avg_cost, current_price };
  if (state.editItem) doUpdate('holdings', state.editItem.id, row);
  else doInsert('holdings', row);
}

async function refreshAllHoldings() {
  showToast('刷新行情...');
  let updated = 0;
  for (const h of state.holdings) {
    try {
      const q = await fetchQuote(h.ticker);
      const updates = { current_price: q.price };
      if (state._localMode) {
        const idx = state.holdings.findIndex(r => r.id === h.id);
        if (idx >= 0) state.holdings[idx] = { ...state.holdings[idx], ...updates };
      } else {
        await supabase.from('holdings').update(updates).eq('id', h.id);
        const idx = state.holdings.findIndex(r => r.id === h.id);
        if (idx >= 0) state.holdings[idx] = { ...state.holdings[idx], ...updates };
      }
      updated++;
    } catch(e) { /* skip failed tickers */ }
  }
  if (state._localMode) saveLocal();
  showToast(`已更新 ${updated}/${state.holdings.length} 个持仓价格 ✓`);
  render();
}

function initPortfolioChart() {
  if (!window.Chart || state.holdings.length === 0) return;
  const canvas = document.getElementById('portfolio-pie');
  if (!canvas) return;

  const labels = state.holdings.map(h => h.ticker);
  const values = state.holdings.map(h => (parseFloat(h.current_price)||0) * (parseFloat(h.shares)||0));
  const colors = state.holdings.map((_, i) => ALLOC_COLORS[i % ALLOC_COLORS.length]);

  chartInstances['pie'] = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderColor: '#0a1910', borderWidth: 2 }],
    },
    options: {
      responsive: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#7b8ba8', font: { size: 10 }, padding: 12 } },
        tooltip: { backgroundColor: '#0a1910', borderColor: '#1e442e', borderWidth: 1, titleColor: '#f0f4fc', bodyColor: '#c4cedf' },
      },
    },
  });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
(async function init() {
  // Show loading immediately
  document.getElementById('app').innerHTML = '<div class="loading-screen"><div class="loading-icon">◈</div><div class="loading-text">INITIALIZING...</div></div>';

  // Load SDKs in parallel
  const [sdkLoaded] = await Promise.all([
    loadSupabaseSDK(),
    loadChartJS(),
    loadTensorFlow(),
  ]);

  const cfg = getConfig();
  if (cfg && sdkLoaded && window.supabase) {
    try {
      initSupabase(cfg.url, cfg.key);
      state.configured = true;
      render();
      await loadAll();
      state.ready = true;
      render();
    } catch(e) {
      console.error('Supabase init error:', e);
      useLocalMode();
    }
  } else if (!sdkLoaded || !window.supabase) {
    // SDK failed to load — go straight to local mode
    console.warn('Supabase SDK not available, using local mode');
    useLocalMode();
  } else {
    render(); // shows setup screen
  }
})();
</script>
