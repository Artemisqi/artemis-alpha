<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARTEMIS ALPHA · Investment Decision Audit</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════ */
/* DESIGN SYSTEM — Terminal Luxe               */
/* ═══════════════════════════════════════════ */
:root {
  --bg-0: #060f0a;
  --bg-1: #0a1910;
  --bg-2: #112618;
  --bg-3: #1a3524;
  --border: #1e442e;
  --border-light: #265538;
  --text-0: #f0f4fc;
  --text-1: #c4cedf;
  --text-2: #7b8ba8;
  --text-3: #4a5874;
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.12);
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.12);
  --red: #ff5252;
  --red-dim: rgba(255,82,82,0.12);
  --amber: #ffab00;
  --amber-dim: rgba(255,171,0,0.12);
  --purple: #b388ff;
  --purple-dim: rgba(179,136,255,0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --shadow: 0 2px 20px rgba(0,0,0,0.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-mono);
  background: var(--bg-0);
  color: var(--text-1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* ═══════ LAYOUT ═══════ */
.app { max-width: 860px; margin: 0 auto; padding: 0 16px 100px; position: relative; z-index: 1; }

/* ═══════ HEADER ═══════ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo {
  font-size: 30px; color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,229,255,0.4);
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%, 100% { text-shadow: 0 0 20px rgba(0,229,255,0.4); }
  50% { text-shadow: 0 0 30px rgba(0,229,255,0.6), 0 0 60px rgba(0,229,255,0.2); }
}
.header-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 800;
  letter-spacing: 4px; color: var(--text-0);
}
.header-sub {
  font-size: 9px; color: var(--text-3);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.export-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); padding: 7px 16px; border-radius: var(--radius-sm);
  cursor: pointer; font-family: var(--font-mono); font-size: 12px;
  transition: var(--transition);
}
.export-btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* ═══════ NAV ═══════ */
.nav {
  display: flex; gap: 4px; padding: 14px 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav::-webkit-scrollbar { display: none; }
.nav-tab {
  display: flex; align-items: center; gap: 7px;
  background: transparent; border: none; color: var(--text-3);
  padding: 9px 16px; border-radius: var(--radius);
  cursor: pointer; font-family: var(--font-mono); font-size: 13px;
  white-space: nowrap; transition: var(--transition);
}
.nav-tab:hover { color: var(--text-2); background: var(--bg-2); }
.nav-tab.active { background: var(--bg-3); color: var(--cyan); }
.tab-icon { font-size: 15px; }

/* ═══════ MAIN ═══════ */
.main { padding-top: 24px; }

/* ═══════ STATS GRID ═══════ */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-1); border-radius: var(--radius);
  padding: 18px 20px; border-left: 3px solid var(--border);
  transition: var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.stat-label {
  font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 700; margin-top: 6px;
}
.stat-sub { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* ═══════ DASHBOARD ═══════ */
.dash-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media (max-width: 600px) { .dash-row { grid-template-columns: 1fr; } }
.dash-section {
  background: var(--bg-1); border-radius: var(--radius); padding: 18px;
  border: 1px solid var(--border);
}
.dash-title {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 14px;
}
.mini-card { padding: 9px 0; border-bottom: 1px solid var(--border); }
.mini-card:last-child { border-bottom: none; }
.mini-row { display: flex; align-items: center; gap: 10px; }
.mini-date { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* ═══════ MOOD TIMELINE ═══════ */
.mood-timeline { display: flex; flex-direction: column; gap: 10px; }
.mood-dot { display: flex; align-items: center; gap: 10px; }
.mood-emoji { font-size: 22px; }
.mood-label-sm { font-size: 12px; color: var(--text-2); }

/* ═══════ SECTION HEADER ═══════ */
.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700; color: var(--text-0);
}
.add-btn {
  background: var(--cyan); color: var(--bg-0); border: none;
  padding: 9px 22px; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; font-size: 13px;
  font-family: var(--font-mono); transition: var(--transition);
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
}
.add-btn:hover { box-shadow: 0 0 30px rgba(0,229,255,0.4); transform: translateY(-1px); }

/* ═══════ FORM CARD ═══════ */
.form-card {
  background: var(--bg-1); border-radius: var(--radius);
  padding: 24px; margin-bottom: 24px;
  border: 1px solid var(--border-light);
  animation: slideDown 0.25s ease-out;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
.form-label {
  display: block; font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
}
.form-input {
  width: 100%; background: var(--bg-0); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px;
  color: var(--text-0); font-size: 14px; font-family: var(--font-mono);
  outline: none; transition: var(--transition);
}
.form-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
.form-textarea {
  width: 100%; background: var(--bg-0); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 14px;
  color: var(--text-1); font-size: 13px; font-family: var(--font-mono);
  resize: vertical; outline: none; transition: var(--transition);
  line-height: 1.6;
}
.form-textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }

/* ═══════ TOGGLE BUTTONS ═══════ */
.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; }
.toggle-btn {
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-2); padding: 8px 18px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-family: var(--font-mono);
  transition: var(--transition);
}
.toggle-btn:hover { border-color: var(--text-3); }
.toggle-btn.active-long { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.toggle-btn.active-short { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.toggle-btn.active-neutral { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

/* ═══════ MOOD SELECTOR ═══════ */
.mood-selector { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.mood-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--bg-2); border: 2px solid transparent;
  padding: 14px 18px; border-radius: var(--radius);
  cursor: pointer; font-family: var(--font-mono); color: var(--text-2);
  transition: var(--transition);
}
.mood-btn:hover { border-color: var(--border-light); }
.mood-btn.active { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }
.mood-btn .emoji { font-size: 30px; }
.mood-btn .label { font-size: 10px; }

/* ═══════ CONFIDENCE ═══════ */
.conf-row { display: flex; gap: 6px; }
.conf-btn {
  flex: 1; background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-2); padding: 9px 4px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 11px; font-family: var(--font-mono);
  text-align: center; transition: var(--transition);
}
.conf-btn.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }

/* ═══════ RANGE SLIDER ═══════ */
.slider { width: 100%; accent-color: var(--cyan); margin-top: 8px; cursor: pointer; }
.slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-top: 4px; }

/* ═══════ FORM ACTIONS ═══════ */
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.cancel-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); padding: 9px 22px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; font-family: var(--font-mono);
  transition: var(--transition);
}
.cancel-btn:hover { border-color: var(--text-3); }
.save-btn {
  background: var(--cyan); color: var(--bg-0); border: none;
  padding: 9px 28px; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; font-size: 13px;
  font-family: var(--font-mono); transition: var(--transition);
}
.save-btn:hover { box-shadow: 0 0 20px rgba(0,229,255,0.3); }

/* ═══════ CARD LIST ═══════ */
.card-list { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--bg-1); border-radius: var(--radius);
  padding: 16px 20px; border: 1px solid var(--border);
  transition: var(--transition);
}
.card:hover { border-color: var(--border-light); }
.card-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.card-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.card-right { display: flex; align-items: center; gap: 8px; }

.ticker {
  font-family: var(--font-display);
  font-weight: 700; font-size: 17px; color: var(--text-0);
  letter-spacing: 1px;
}
.badge {
  font-size: 10px; padding: 3px 10px; border-radius: 4px; font-weight: 500;
  letter-spacing: 0.5px;
}
.badge-long { background: var(--green-dim); color: var(--green); }
.badge-short { background: var(--red-dim); color: var(--red); }
.badge-neutral { background: rgba(123,139,168,0.12); color: var(--text-2); }
.size-badge { font-size: 10px; color: var(--text-3); background: var(--bg-2); padding: 3px 9px; border-radius: 4px; }

.pnl-big {
  font-family: var(--font-display);
  font-weight: 700; font-size: 22px; letter-spacing: 0.5px;
}
.pnl-pos { color: var(--green); }
.pnl-neg { color: var(--red); }

.card-note { font-size: 13px; color: var(--text-2); margin-top: 10px; line-height: 1.6; white-space: pre-wrap; }
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
}
.card-date { font-size: 10px; color: var(--text-3); }
.icon-btn {
  background: transparent; border: none; color: var(--text-3);
  cursor: pointer; font-size: 14px; padding: 4px 8px;
  font-family: var(--font-mono); transition: var(--transition);
}
.icon-btn:hover { color: var(--text-1); }

/* ═══════ PROBABILITY CIRCLE ═══════ */
.prob-circle {
  width: 56px; height: 56px; border-radius: 50%;
  border: 2px solid var(--cyan); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 15px rgba(0,229,255,0.15);
}
.prob-val { font-size: 15px; font-weight: 700; color: var(--cyan); }

.event-text { font-size: 14px; color: var(--text-1); }
.mood-tag { font-size: 14px; font-weight: 600; color: var(--text-0); }
.conf-tag { font-size: 10px; color: var(--purple); background: var(--purple-dim); padding: 3px 9px; border-radius: 4px; }
.time-tag { font-size: 10px; color: var(--text-2); background: var(--bg-2); padding: 3px 9px; border-radius: 4px; }

/* Forecast border states */
.card.correct { border-left: 3px solid var(--green); }
.card.incorrect { border-left: 3px solid var(--red); }
.card.pending { border-left: 3px solid var(--border); }

/* ═══════ EMPTY STATE ═══════ */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-3);
}
.empty-icon { font-size: 52px; display: block; margin-bottom: 16px; opacity: 0.4; }
.empty-hint { font-size: 11px; color: var(--border-light); margin-top: 6px; }

/* ═══════ TOAST ═══════ */
.toast {
  position: fixed; top: 20px; right: 20px;
  background: var(--cyan); color: var(--bg-0);
  padding: 10px 22px; border-radius: var(--radius);
  font-weight: 600; font-size: 13px; z-index: 9999;
  font-family: var(--font-mono);
  box-shadow: 0 4px 30px rgba(0,229,255,0.3);
  animation: toastIn 0.3s ease-out;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px) translateX(10px); }
  to { opacity: 1; transform: translateY(0) translateX(0); }
}

/* ═══════ LOADING ═══════ */
.loading-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100vh;
}
.loading-icon { font-size: 48px; animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-3); font-size: 13px; margin-top: 16px; letter-spacing: 2px; }

/* ═══════ SETUP SCREEN ═══════ */
.setup-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 40px 20px;
}
.setup-card {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 40px; max-width: 480px; width: 100%;
}
.setup-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700; color: var(--text-0);
  text-align: center; margin-bottom: 8px;
}
.setup-sub { text-align: center; color: var(--text-3); font-size: 12px; margin-bottom: 30px; }
.setup-field { margin-bottom: 18px; }
.setup-help { font-size: 11px; color: var(--text-3); margin-top: 4px; line-height: 1.5; }
.setup-save {
  width: 100%; background: var(--cyan); color: var(--bg-0); border: none;
  padding: 12px; border-radius: var(--radius); cursor: pointer;
  font-weight: 600; font-size: 14px; font-family: var(--font-mono);
  margin-top: 10px; transition: var(--transition);
}
.setup-save:hover { box-shadow: 0 0 30px rgba(0,229,255,0.3); }
.setup-skip {
  display: block; text-align: center; margin-top: 16px;
  color: var(--text-3); font-size: 12px; cursor: pointer;
  background: none; border: none; font-family: var(--font-mono);
}
.setup-skip:hover { color: var(--text-2); }

/* ═══════ MARKETS / CHARTS ═══════ */
.market-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.market-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700; color: var(--text-0);
}
.market-controls { display: flex; gap: 6px; flex-wrap: wrap; }
.range-btn {
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-2); padding: 6px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 11px; font-family: var(--font-mono);
  transition: var(--transition);
}
.range-btn:hover { border-color: var(--text-3); }
.range-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

.stock-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.stock-chip {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  cursor: pointer; transition: var(--transition);
  display: flex; flex-direction: column; gap: 6px;
}
.stock-chip:hover { border-color: var(--border-light); transform: translateY(-1px); }
.stock-chip.active { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,229,255,0.15); }
.stock-chip-top { display: flex; align-items: center; justify-content: space-between; }
.stock-chip-ticker {
  font-family: var(--font-display);
  font-weight: 700; font-size: 15px; color: var(--text-0);
}
.stock-chip-price { font-size: 14px; font-weight: 600; }
.stock-chip-change { font-size: 11px; font-weight: 500; }
.stock-chip-name { font-size: 10px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-up .stock-chip-price, .chip-up .stock-chip-change { color: var(--green); }
.chip-down .stock-chip-price, .chip-down .stock-chip-change { color: var(--red); }
.chip-flat .stock-chip-price { color: var(--text-1); }
.chip-flat .stock-chip-change { color: var(--text-3); }

.chart-container {
  background: var(--bg-1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  position: relative; min-height: 420px;
}
.chart-info {
  display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; flex-wrap: wrap;
}
.chart-ticker {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 800; color: var(--text-0);
}
.chart-price-lg { font-size: 22px; font-weight: 700; }
.chart-change-lg { font-size: 14px; font-weight: 500; }
.chart-area { width: 100%; height: 350px; }
.chart-loading {
  display: flex; align-items: center; justify-content: center;
  height: 350px; color: var(--text-3); font-size: 13px;
}
.chart-error { color: var(--red); font-size: 12px; text-align: center; padding: 20px; }

.market-stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px; margin-top: 16px;
}
.market-stat {
  background: var(--bg-2); border-radius: var(--radius-sm); padding: 12px 14px;
}
.market-stat-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }
.market-stat-val { font-size: 16px; font-weight: 600; color: var(--text-0); margin-top: 4px; }

.refresh-indicator {
  font-size: 10px; color: var(--text-3); display: flex; align-items: center; gap: 6px;
}
.refresh-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ═══════ RESPONSIVE ═══════ */
@media (max-width: 500px) {
  .header-title { font-size: 16px; letter-spacing: 2px; }
  .stat-value { font-size: 26px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .form-card { padding: 18px; }
  .mood-btn { padding: 10px 12px; }
  .mood-btn .emoji { font-size: 24px; }
  .stock-grid { grid-template-columns: 1fr 1fr; }
  .chart-area { height: 280px; }
  .chart-ticker { font-size: 20px; }
}
</style>
</head>
<body>

<div id="app"></div>

<!-- ═══════════════════════════════════════════ -->
<!-- SUPABASE SDK (multiple CDN fallbacks)       -->
<!-- ═══════════════════════════════════════════ -->
<script>
// Try loading Supabase from multiple CDNs
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function loadSupabaseSDK() {

    'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase-js.min.js',
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase-js.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/supabase/2.39.3/umd.min.js'
  ];
  for (const url of cdns) {
    try {
      await loadScript(url);
      if (window.supabase) return true;
    } catch(e) { /* try next */ }

  return false;
}

    'https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js',

  ];
  for (const url of cdns) {
    try {
      await loadScript(url);
      if (window.LightweightCharts) return true;
    } catch(e) { /* try next */ }

  return false;
}
</script>

<script>
// ══════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════

let supabase = null;
let state = {
  ready: false,
  configured: false,
  tab: 'dashboard',
  showForm: null,
  editItem: null,
  trades: [],
  moods: [],
  forecasts: [],
  notes: [],
};

const MOOD_LABELS = [
  { val: 1, emoji: '😰', label: '恐慌' },
  { val: 2, emoji: '😟', label: '焦虑' },
  { val: 3, emoji: '😐', label: '中性' },
  { val: 4, emoji: '😊', label: '乐观' },
  { val: 5, emoji: '🤑', label: '贪婪' },
];

const CONF_LABELS = [
  { val: 1, label: '很低' },
  { val: 2, label: '偏低' },
  { val: 3, label: '中等' },
  { val: 4, label: '偏高' },
  { val: 5, label: '很高' },
];

const CATEGORIES = ['宏观', '行业', '个股', '技术面', '其他'];

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const uid = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let toastTimer = null;
function showToast(msg) {
  clearTimeout(toastTimer);
  let el = document.getElementById('toast');
  if (!el) { el = document.createElement('div'); el.id = 'toast'; el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg; el.style.display = 'block';
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2000);
}

// ══════════════════════════════════════════════
// SUPABASE INIT & DATA
// ══════════════════════════════════════════════

function getConfig() {
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  return (url && key) ? { url, key } : null;
}

function initSupabase(url, key) {
  supabase = window.supabase.createClient(url, key);
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
}

async function createTables() {
  // Try to create tables via RPC or just let them exist
  const tables = ['trades', 'moods', 'forecasts', 'notes'];
  for (const t of tables) {
    // Just try to select — if table doesn't exist, user needs to create it
    const { error } = await supabase.from(t).select('id').limit(1);
    if (error && error.code === '42P01') {
      // Table doesn't exist — we'll handle this in setup
      return false;
    }
  }
  return true;
}

async function loadAll() {
  const [t, m, f, n] = await Promise.all([
    supabase.from('trades').select('*').order('created_at', { ascending: false }),
    supabase.from('moods').select('*').order('created_at', { ascending: false }),
    supabase.from('forecasts').select('*').order('created_at', { ascending: false }),
    supabase.from('notes').select('*').order('created_at', { ascending: false }),
  ]);
  state.trades = t.data || [];
  state.moods = m.data || [];
  state.forecasts = f.data || [];
  state.notes = n.data || [];
}

async function insertRow(table, row) {
  row.id = uid();
  row.created_at = new Date().toISOString();
  const { data, error } = await supabase.from(table).insert([row]).select();
  if (error) { showToast('保存失败: ' + error.message); return; }
  state[table].unshift(data[0]);
  state.showForm = null; state.editItem = null;
  showToast('已保存 ✓');
  render();
}

async function updateRow(table, id, updates) {
  const { error } = await supabase.from(table).update(updates).eq('id', id);
  if (error) { showToast('更新失败: ' + error.message); return; }
  const idx = state[table].findIndex(r => r.id === id);
  if (idx >= 0) state[table][idx] = { ...state[table][idx], ...updates };
  state.showForm = null; state.editItem = null;
  showToast('已更新 ✓');
  render();
}

async function deleteRow(table, id) {
  if (!confirm('确认删除？')) return;
  const { error } = await supabase.from(table).delete().eq('id', id);
  if (error) { showToast('删除失败: ' + error.message); return; }
  state[table] = state[table].filter(r => r.id !== id);
  showToast('已删除');
  render();
}

// ══════════════════════════════════════════════
// CSV EXPORT
// ══════════════════════════════════════════════
function exportCSV() {
  const rows = [['类型','日期','标的','方向','仓位%','盈亏%','情绪','置信度','概率%','结果','备注']];
  state.trades.forEach(t => rows.push(['交易', fmtDate(t.created_at), t.ticker, t.direction, t.size, t.pnl, '', '', '', '', t.note]));
  state.moods.forEach(m => rows.push(['情绪', fmtDate(m.created_at), '', '', '', '', m.mood, m.confidence, '', '', m.note]));
  state.forecasts.forEach(f => rows.push(['预测', fmtDate(f.created_at), f.ticker, '', '', '', '', '', f.probability, f.outcome||'', f.note]));
  state.notes.forEach(n => rows.push(['笔记', fmtDate(n.created_at), '', '', '', '', '', '', '', '', n.content]));
  const csv = rows.map(r => r.map(c => `"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `artemis-alpha-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV 已导出 ✓');
}

// ══════════════════════════════════════════════
// LOCAL-ONLY MODE (no Supabase)
// ══════════════════════════════════════════════
function useLocalMode() {
  // Load from localStorage
  const saved = localStorage.getItem('aa_local_data');
  if (saved) {
    const d = JSON.parse(saved);
    state.trades = d.trades || [];
    state.moods = d.moods || [];
    state.forecasts = d.forecasts || [];
    state.notes = d.notes || [];
  }
  state.configured = true;
  state.ready = true;
  state._localMode = true;
  render();
}

function saveLocal() {
  localStorage.setItem('aa_local_data', JSON.stringify({
    trades: state.trades, moods: state.moods,
    forecasts: state.forecasts, notes: state.notes,
  }));
}

async function localInsert(table, row) {
  row.id = uid(); row.created_at = new Date().toISOString();
  state[table].unshift(row);
  state.showForm = null; state.editItem = null;
  saveLocal(); showToast('已保存 ✓'); render();
}

async function localUpdate(table, id, updates) {
  const idx = state[table].findIndex(r => r.id === id);
  if (idx >= 0) state[table][idx] = { ...state[table][idx], ...updates };
  state.showForm = null; state.editItem = null;
  saveLocal(); showToast('已更新 ✓'); render();
}

async function localDelete(table, id) {
  if (!confirm('确认删除？')) return;
  state[table] = state[table].filter(r => r.id !== id);
  saveLocal(); showToast('已删除'); render();
}

// Unified interface
function doInsert(table, row) { return state._localMode ? localInsert(table, row) : insertRow(table, row); }
function doUpdate(table, id, u) { return state._localMode ? localUpdate(table, id, u) : updateRow(table, id, u); }
function doDelete(table, id) { return state._localMode ? localDelete(table, id) : deleteRow(table, id); }

// ══════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');

  if (!state.ready && !state.configured) {
    app.innerHTML = renderSetup();
    return;
  }

  if (!state.ready) {
    app.innerHTML = `<div class="loading-screen"><div class="loading-icon">◈</div><div class="loading-text">LOADING DATA...</div></div>`;
    return;
  }

  const totalTrades = state.trades.length;
  const winTrades = state.trades.filter(t => parseFloat(t.pnl) > 0).length;
  const winRate = totalTrades > 0 ? ((winTrades / totalTrades) * 100).toFixed(0) : '—';
  const avgMood = state.moods.length > 0 ? (state.moods.reduce((s,m) => s + (m.mood||3), 0) / state.moods.length).toFixed(1) : '—';
  const resolved = state.forecasts.filter(f => f.outcome === 'correct' || f.outcome === 'incorrect');
  const accuracy = resolved.length > 0 ? ((resolved.filter(f => f.outcome === 'correct').length / resolved.length) * 100).toFixed(0) : '—';

  let content = '';
  switch (state.tab) {
    case 'dashboard': content = renderDashboard({ totalTrades, winRate, avgMood, accuracy, resolved: resolved.length, totalForecasts: state.forecasts.length }); break;
    case 'markets': content = renderMarkets(); break;
    case 'trades': content = renderTrades(); break;
    case 'moods': content = renderMoods(); break;
    case 'forecasts': content = renderForecasts(); break;
    case 'notes': content = renderNotes(); break;
  }

  const tabs = [
    { key: 'dashboard', label: '仪表盘', icon: '◉' },
    { key: 'markets', label: '行情', icon: '◆' },
    { key: 'trades', label: '交易', icon: '⇄' },
    { key: 'moods', label: '情绪', icon: '◐' },
    { key: 'forecasts', label: '预测', icon: '⊕' },
    { key: 'notes', label: '笔记', icon: '▤' },
  ];

  app.innerHTML = `
    <div class="app">
      <header class="header">
        <div class="header-left">
          <span class="logo">◈</span>
          <div>
            <div class="header-title">ARTEMIS ALPHA</div>
            <div class="header-sub">Investment Decision Audit System</div>
          </div>
        </div>
        <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
      </header>
      <nav class="nav">
        ${tabs.map(t => `<button class="nav-tab ${state.tab===t.key?'active':''}" onclick="switchTab('${t.key}')"><span class="tab-icon">${t.icon}</span> ${t.label}</button>`).join('')}
      </nav>
      <main class="main">${content}</main>
    </div>
  `;
}

function switchTab(t) {
  state.tab = t; state.showForm = null; state.editItem = null; render();
  if (t === 'markets') {
    // Load chart data after DOM renders
    setTimeout(async () => {
      if (!chartsReady) {
        await loadMarketOverview();
        chartsReady = true;
        render(); // re-render with prices
      }
      loadAndRenderChart(selectedStock, chartRange);
      startMarketRefresh();
    }, 50);
  } else {
    if (marketRefreshTimer) clearInterval(marketRefreshTimer);
  }
}
function openForm(type) { state.showForm = type; state.editItem = null; render(); }
function cancelForm() { state.showForm = null; state.editItem = null; render(); }
function editItem(table, id) {
  state.editItem = state[table].find(r => r.id === id);
  state.showForm = table.replace(/s$/,''); // trades->trade
  render();
}

// ══════════════════════════════════════════════
// SETUP SCREEN
// ══════════════════════════════════════════════
function renderSetup() {
  return `
  <div class="setup-screen">
    <div class="setup-card">
      <div class="logo" style="text-align:center;font-size:40px;margin-bottom:20px;">◈</div>
      <div class="setup-title">ARTEMIS ALPHA</div>
      <div class="setup-sub">连接 Supabase 数据库以启用云端同步</div>
      <div class="setup-field">
        <label class="form-label">SUPABASE URL</label>
        <input class="form-input" id="sb-url" placeholder="https://xxxxx.supabase.co" />
        <div class="setup-help">在 Supabase 项目 Settings → API 里找到</div>
      </div>
      <div class="setup-field">
        <label class="form-label">ANON KEY</label>
        <input class="form-input" id="sb-key" placeholder="eyJhbGciOi..." />
        <div class="setup-help">同一个页面，复制 anon / public key</div>
      </div>
      <button class="setup-save" onclick="connectSupabase()">连接数据库</button>
      <button class="setup-skip" onclick="useLocalMode()">跳过 → 先用本地模式</button>
    </div>
  </div>`;
}

async function connectSupabase() {
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();
  if (!url || !key) { showToast('请填写 URL 和 Key'); return; }
  initSupabase(url, key);
  state.configured = true;
  render(); // show loading
  const ok = await createTables();
  if (!ok) {
    showToast('请先在 Supabase 中创建数据表（见部署指南）');
    state.configured = false;
    render();
    return;
  }
  await loadAll();
  state.ready = true;
  render();
}

// ══════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════
function renderDashboard(s) {
  const cards = [
    { label: '总交易数', value: s.totalTrades, color: 'var(--cyan)', border: 'var(--cyan)' },
    { label: '胜率', value: s.winRate === '—' ? '—' : s.winRate+'%', color: s.winRate!=='—'&&parseInt(s.winRate)>=50?'var(--green)':'var(--red)', border: s.winRate!=='—'&&parseInt(s.winRate)>=50?'var(--green)':'var(--red)' },
    { label: '平均情绪', value: s.avgMood, color: 'var(--amber)', border: 'var(--amber)' },
    { label: '预测准确率', value: s.accuracy==='—'?'—':s.accuracy+'%', sub: `${s.resolved}/${s.totalForecasts}`, color: 'var(--purple)', border: 'var(--purple)' },
  ];

  const recentTrades = state.trades.slice(0, 5);
  const recentMoods = state.moods.slice(0, 5);

  return `
    <div class="stats-grid">
      ${cards.map(c => `
        <div class="stat-card" style="border-left-color:${c.border}">
          <div class="stat-label">${c.label}</div>
          <div class="stat-value" style="color:${c.color}">${c.value}</div>
          ${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ''}
        </div>
      `).join('')}
    </div>
    <div class="dash-row">
      <div class="dash-section">
        <div class="dash-title">近期交易</div>
        ${recentTrades.length === 0 ? '<div style="color:var(--text-3);font-size:12px;">暂无记录</div>' :
          recentTrades.map(t => `
            <div class="mini-card">
              <div class="mini-row">
                <span class="ticker" style="font-size:14px;">${esc(t.ticker)}</span>
                <span style="font-size:11px;color:${t.direction==='做多'?'var(--green)':'var(--red)'}">${esc(t.direction)}</span>
                <span style="font-weight:600;font-size:12px;color:${parseFloat(t.pnl)>=0?'var(--green)':'var(--red)'}; margin-left:auto;">
                  ${parseFloat(t.pnl)>=0?'+':''}${esc(t.pnl)}%
                </span>
              </div>
              <div class="mini-date">${fmtDate(t.created_at)}</div>
            </div>
          `).join('')}
      </div>
      <div class="dash-section">
        <div class="dash-title">情绪走势</div>
        ${recentMoods.length === 0 ? '<div style="color:var(--text-3);font-size:12px;">暂无记录</div>' :
          `<div class="mood-timeline">
            ${recentMoods.map(m => {
              const ml = MOOD_LABELS.find(x => x.val === m.mood) || MOOD_LABELS[2];
              return `<div class="mood-dot"><span class="mood-emoji">${ml.emoji}</span><span class="mood-label-sm">${ml.label}</span><span class="mini-date">${fmtDate(m.created_at)}</span></div>`;
            }).join('')}
          </div>`}
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════
// TRADES
// ══════════════════════════════════════════════
function renderTrades() {
  const e = state.editItem;
  const form = state.showForm === 'trade' ? `
    <div class="form-card">
      <div class="form-grid">
        <div>
          <label class="form-label">标的 *</label>
          <input class="form-input" id="f-ticker" placeholder="如 NVDA" value="${esc(e?.ticker||'')}" oninput="this.value=this.value.toUpperCase()"/>
        </div>
        <div>
          <label class="form-label">方向</label>
          <div class="toggle-row">
            <button class="toggle-btn ${(!e||e.direction==='做多')?'active-long':''}" onclick="this.parentElement.querySelectorAll('.toggle-btn').forEach(b=>b.className='toggle-btn');this.className='toggle-btn active-long'" data-val="做多">做多</button>
            <button class="toggle-btn ${e?.direction==='做空'?'active-short':''}" onclick="this.parentElement.querySelectorAll('.toggle-btn').forEach(b=>b.className='toggle-btn');this.className='toggle-btn active-short'" data-val="做空">做空</button>
          </div>
        </div>
        <div>
          <label class="form-label">仓位 %</label>
          <input class="form-input" id="f-size" type="number" placeholder="如 5" value="${esc(e?.size||'')}"/>
        </div>
        <div>
          <label class="form-label">盈亏 %</label>
          <input class="form-input" id="f-pnl" type="number" step="0.01" placeholder="如 12.5 或 -3.2" value="${esc(e?.pnl||'')}"/>
        </div>
        <div>
          <label class="form-label">入场价</label>
          <input class="form-input" id="f-entry" type="number" step="0.01" placeholder="可选" value="${esc(e?.entry_price||'')}"/>
        </div>
        <div>
          <label class="form-label">出场价</label>
          <input class="form-input" id="f-exit" type="number" step="0.01" placeholder="可选" value="${esc(e?.exit_price||'')}"/>
        </div>
      </div>
      <div style="margin-top:14px;">
        <label class="form-label">备注 / 交易逻辑</label>
        <textarea class="form-textarea" id="f-note" rows="3" placeholder="为什么做这笔交易？触发条件？">${esc(e?.note||'')}</textarea>
      </div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="cancelForm()">取消</button>
        <button class="save-btn" onclick="saveTrade()">${e?'更新':'保存'}</button>
      </div>
    </div>` : '';

  return `
    <div class="section-header">
      <div class="section-title">交易日志</div>
      ${state.showForm!=='trade' ? '<button class="add-btn" onclick="openForm(\'trade\')">+ 新交易</button>' : ''}
    </div>
    ${form}
    ${state.trades.length === 0 && !form ? `
      <div class="empty-state">
        <span class="empty-icon">⇄</span>
        <p>还没有交易记录</p>
        <p class="empty-hint">点击「+ 新交易」开始记录</p>
      </div>` :
    `<div class="card-list">
      ${state.trades.map(t => `
        <div class="card">
          <div class="card-row">
            <div class="card-left">

            <div class="card-right">
              <span class="pnl-big ${parseFloat(t.pnl)>=0?'pnl-pos':'pnl-neg'}">${parseFloat(t.pnl)>=0?'+':''}${esc(t.pnl)}%</span>
            </div>
          </div>
          ${t.note ? `<div class="card-note">${esc(t.note)}</div>` : ''}
          <div class="card-footer">
            <span class="card-date">${fmtDate(t.created_at)} ${fmtTime(t.created_at)}</span>

            </div>
          </div>
        </div>
      `).join('')}
    </div>`}
  `;
}

function saveTrade() {
  const ticker = document.getElementById('f-ticker').value.trim();
  if (!ticker) { showToast('请输入标的'); return; }
  const dirBtns = document.querySelectorAll('.form-card .toggle-btn');
  let direction = '做多';
  dirBtns.forEach(b => { if (b.classList.contains('active-long')) direction = '做多'; if (b.classList.contains('active-short')) direction = '做空'; });
  const row = {
    ticker,
    direction,
    size: document.getElementById('f-size').value || null,
    pnl: document.getElementById('f-pnl').value || '0',
    entry_price: document.getElementById('f-entry').value || null,
    exit_price: document.getElementById('f-exit').value || null,
    note: document.getElementById('f-note').value || '',
  };
  if (state.editItem) doUpdate('trades', state.editItem.id, row);
  else doInsert('trades', row);
}

// ══════════════════════════════════════════════
// MOODS
// ══════════════════════════════════════════════
let tempMood = 3, tempConf = 3, tempBias = '中性';

function renderMoods() {
  const e = state.editItem;
  if (e) { tempMood = e.mood || 3; tempConf = e.confidence || 3; tempBias = e.market_bias || '中性'; }
  else if (state.showForm === 'mood' && !state.editItem) { tempMood = 3; tempConf = 3; tempBias = '中性'; }

  const form = state.showForm === 'mood' ? `
    <div class="form-card">
      <div>

function parseYahooChart(json) {
  const result = json.chart?.result?.[0];
  if (!result) return null;
  const meta = result.meta;
  const quotes = result.indicators?.quote?.[0];
  const timestamps = result.timestamp || [];
  if (!quotes || !timestamps.length) return null;

  const history = [];
  for (let i = 0; i < timestamps.length; i++) {
    const o = quotes.open?.[i], h = quotes.high?.[i], l = quotes.low?.[i], c = quotes.close?.[i], v = quotes.volume?.[i];
    if (o == null || h == null || l == null || c == null) continue;
    history.push({
      time: timestamps[i],
      open: parseFloat(o.toFixed(2)),
      high: parseFloat(h.toFixed(2)),
      low: parseFloat(l.toFixed(2)),
      close: parseFloat(c.toFixed(2)),
      volume: v || 0,
    });
  }
  if (!history.length) return null;

  const last = history[history.length - 1];
  const prev = history.length > 1 ? history[history.length - 2] : last;
  const price = meta.regularMarketPrice || last?.close || 0;
  const prevClose = meta.chartPreviousClose || prev?.close || price;
  const change = price - prevClose;
  const changePct = prevClose ? ((change / prevClose) * 100) : 0;

  return {
    price: parseFloat(price.toFixed(2)),
    change: parseFloat(change.toFixed(2)),
    changePct: parseFloat(changePct.toFixed(2)),
    high: last?.high || 0,
    low: last?.low || 0,
    open: last?.open || 0,
    vol: last?.volume || 0,
    currency: meta.currency || 'USD',
    history,
  };
}

async function fetchStockData(ticker, range = '6mo') {
  const interval = (range === '5y') ? '1wk' : '1d';
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;

  // Multiple CORS proxy strategies for reliability
  const proxyStrategies = [
    `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yahooUrl)}`,
    `https://thingproxy.freeboard.io/fetch/${yahooUrl}`,
  ];

  for (const pUrl of proxyStrategies) {
    try {
      const resp = await fetch(pUrl, { signal: AbortSignal.timeout(10000) });
      if (!resp.ok) continue;
      const json = await resp.json();
      const parsed = parseYahooChart(json);
      if (parsed) return parsed;
    } catch(e) { continue; }
  }

  // Fallback: try Yahoo Finance v7 quote endpoint for at least current price
  if (range === '1mo' || range === '6mo') {
    const quoteUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(ticker)}`;
    const quoteProxies = [
      `https://corsproxy.io/?${encodeURIComponent(quoteUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(quoteUrl)}`,
    ];
    for (const pUrl of quoteProxies) {
      try {
        const resp = await fetch(pUrl, { signal: AbortSignal.timeout(8000) });
        if (!resp.ok) continue;
        const json = await resp.json();
        const q = json.quoteResponse?.result?.[0];
        if (!q || !q.regularMarketPrice) continue;
        const price = q.regularMarketPrice;
        const change = q.regularMarketChange || 0;
        const changePct = q.regularMarketChangePercent || 0;
        // Return quote-only data (no history for chart, but at least shows price)
        return {
          price: parseFloat(price.toFixed(2)),
          change: parseFloat(change.toFixed(2)),
          changePct: parseFloat(changePct.toFixed(2)),
          high: q.regularMarketDayHigh || 0,
          low: q.regularMarketDayLow || 0,
          open: q.regularMarketOpen || 0,
          vol: q.regularMarketVolume || 0,
          currency: q.currency || 'USD',
          history: [],
        };
      } catch(e) { continue; }
    }
  }

  return null;
}

async function loadMarketOverview() {
  const promises = WATCH_STOCKS.map(async (s) => {
    const cached = marketData[s.ticker];
    // Only fetch overview (1mo) if we don't have price yet

      const data = await fetchStockData(s.ticker, '1mo');
      if (data) marketData[s.ticker] = { ...data, _range: '1mo' };
    }
  });
  await Promise.allSettled(promises);
}

async function loadChartData(ticker, range) {
  const data = await fetchStockData(ticker, range);
  if (data) {
    marketData[ticker] = { ...data, _range: range };
    return true;
  }
  return false;
}

async function loadAndRenderChart(ticker, range) {

  if (!chartEl) return;
  chartEl.innerHTML = '<div class="chart-loading">加载中...</div>';

function renderChart(ticker) {
  const data = marketData[ticker];
  if (!data || !window.LightweightCharts) return;
  if (!data.history || !data.history.length) {
    const chartEl = document.getElementById('chart-area');
    if (chartEl) chartEl.innerHTML = '<div class="chart-error">有报价但无历史K线数据，请切换时间范围重试</div>';
    return;
  }

  const chartEl = document.getElementById('chart-area');
  if (!chartEl) return;
  chartEl.innerHTML = '';

  // Update info display
  const infoEl = document.getElementById('chart-info-live');
  if (infoEl) {
    const st = WATCH_STOCKS.find(s => s.ticker === ticker);
    const dir = data.change >= 0;
    infoEl.innerHTML = `
      <span class="chart-ticker">${esc(ticker)}</span>
      <span class="chart-price-lg" style="color:${dir?'var(--green)':'var(--red)'}">${data.currency === 'HKD' ? 'HK$' : '$'}${data.price}</span>
      <span class="chart-change-lg" style="color:${dir?'var(--green)':'var(--red)'}">${dir?'+':''}${data.change} (${dir?'+':''}${data.changePct}%)</span>
      <span style="font-size:11px;color:var(--text-3)">${st?.name||''}</span>
    `;
  }

  // Update stats
  const statsEl = document.getElementById('chart-stats');
  if (statsEl && data) {
    const volStr = data.vol >= 1e9 ? (data.vol/1e9).toFixed(2)+'B' : data.vol >= 1e6 ? (data.vol/1e6).toFixed(1)+'M' : data.vol >= 1e3 ? (data.vol/1e3).toFixed(0)+'K' : data.vol;
    statsEl.innerHTML = `
      <div class="market-stat"><div class="market-stat-label">开盘</div><div class="market-stat-val">${data.open}</div></div>
      <div class="market-stat"><div class="market-stat-label">最高</div><div class="market-stat-val" style="color:var(--green)">${data.high}</div></div>
      <div class="market-stat"><div class="market-stat-label">最低</div><div class="market-stat-val" style="color:var(--red)">${data.low}</div></div>
      <div class="market-stat"><div class="market-stat-label">成交量</div><div class="market-stat-val">${volStr}</div></div>
    `;
  }

  // Create chart
  if (chartInstance) { chartInstance.remove(); chartInstance = null; }

  const width = chartEl.clientWidth;
  const height = window.innerWidth <= 500 ? 280 : 350;

  chartInstance = LightweightCharts.createChart(chartEl, {
    width,
    height,
    layout: {
      background: { type: 'solid', color: 'transparent' },
      textColor: '#7b8ba8',
      fontSize: 11,
      fontFamily: "'DM Mono', monospace",
    },
    grid: {
      vertLines: { color: 'rgba(30,68,46,0.3)' },
      horzLines: { color: 'rgba(30,68,46,0.3)' },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: 'rgba(0,229,255,0.3)', width: 1, style: 2, labelBackgroundColor: '#0a1910' },
      horzLine: { color: 'rgba(0,229,255,0.3)', width: 1, style: 2, labelBackgroundColor: '#0a1910' },
    },
    rightPriceScale: {
      borderColor: '#1e442e',
      scaleMargins: { top: 0.1, bottom: 0.25 },
    },
    timeScale: {
      borderColor: '#1e442e',
      timeVisible: false,
    },
    handleScroll: { vertTouchDrag: false },
  });

  candleSeries = chartInstance.addCandlestickSeries({
    upColor: '#00e676',
    downColor: '#ff5252',
    borderUpColor: '#00e676',
    borderDownColor: '#ff5252',
    wickUpColor: '#00e676',
    wickDownColor: '#ff5252',
  });

  // Convert unix timestamps to YYYY-MM-DD for lightweight charts
  const candleData = data.history.map(h => ({
    time: new Date(h.time * 1000).toISOString().slice(0, 10),
    open: h.open, high: h.high, low: h.low, close: h.close,
  }));

  // Deduplicate by time (keep last occurrence)
  const seen = new Set();
  const uniqueCandles = [];
  for (let i = candleData.length - 1; i >= 0; i--) {
    if (!seen.has(candleData[i].time)) {
      seen.add(candleData[i].time);
      uniqueCandles.unshift(candleData[i]);
    }
  }
  candleSeries.setData(uniqueCandles);

  // Volume histogram
  volumeSeries = chartInstance.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });

  chartInstance.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 },
  });

  const volData = data.history.map(h => ({
    time: new Date(h.time * 1000).toISOString().slice(0, 10),
    value: h.volume,
    color: h.close >= h.open ? 'rgba(0,230,118,0.25)' : 'rgba(255,82,82,0.25)',
  }));

  const seenV = new Set();
  const uniqueVol = [];
  for (let i = volData.length - 1; i >= 0; i--) {
    if (!seenV.has(volData[i].time)) {
      seenV.add(volData[i].time);
      uniqueVol.unshift(volData[i]);
    }
  }
  volumeSeries.setData(uniqueVol);

  chartInstance.timeScale().fitContent();

  // Responsive resize
  const ro = new ResizeObserver(() => {
    if (chartInstance && chartEl) {
      chartInstance.applyOptions({ width: chartEl.clientWidth });
    }
  });
  ro.observe(chartEl);
}

function renderMarkets() {
  const chips = WATCH_STOCKS.map(s => {
    const d = marketData[s.ticker];
    const dir = d ? (d.change > 0 ? 'up' : d.change < 0 ? 'down' : 'flat') : 'flat';
    return `
      <div class="stock-chip chip-${dir} ${selectedStock===s.ticker?'active':''}" onclick="selectStock('${s.ticker}')">
        <div class="stock-chip-top">
          <span class="stock-chip-ticker">${esc(s.ticker)}</span>
          <span class="stock-chip-price">${d ? (d.currency==='HKD'?'HK$':'$')+d.price : '...'}</span>
        </div>
        <div class="stock-chip-top">
          <span class="stock-chip-name">${esc(s.name)}</span>
          <span class="stock-chip-change">${d ? (d.change>=0?'+':'')+d.changePct+'%' : '—'}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="market-header">
      <div class="market-title">实时行情</div>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="market-controls">
          ${RANGE_OPTIONS.map(r => `<button class="range-btn ${chartRange===r.key?'active':''}" onclick="setChartRange('${r.key}')">${r.label}</button>`).join('')}
        </div>
        <div class="refresh-indicator"><span class="refresh-dot"></span> LIVE</div>
      </div>
    </div>
    <div class="stock-grid">${chips}</div>
    <div class="chart-container">
      <div class="chart-info" id="chart-info-live">
        <span class="chart-ticker">${esc(selectedStock)}</span>
        <span style="font-size:13px;color:var(--text-3)">加载中...</span>
      </div>
      <div class="chart-area" id="chart-area">
        <div class="chart-loading">加载图表数据...</div>
      </div>
      <div class="market-stats-row" id="chart-stats"></div>
    </div>
  `;
}

function startMarketRefresh() {
  if (marketRefreshTimer) clearInterval(marketRefreshTimer);
  marketRefreshTimer = setInterval(async () => {
    if (state.tab !== 'markets') return;
    // Refresh selected stock
    const ok = await loadChartData(selectedStock, chartRange);
    if (ok) renderChart(selectedStock);
    // Refresh overview prices
    for (const s of WATCH_STOCKS) {
      const data = await fetchStockData(s.ticker, '1mo');
      if (data) {
        marketData[s.ticker] = { ...marketData[s.ticker], price: data.price, change: data.change, changePct: data.changePct };
      }
    }
    render();
    renderChart(selectedStock);
  }, 60000); // refresh every 60s
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
(async function init() {
  // Show loading immediately
  document.getElementById('app').innerHTML = '<div class="loading-screen"><div class="loading-icon">◈</div><div class="loading-text">INITIALIZING...</div></div>';

  // Load SDKs in parallel
  const [sdkLoaded] = await Promise.allSettled([loadSupabaseSDK(), loadLightweightCharts()]);
  const supabaseLoaded = sdkLoaded.status === 'fulfilled' && sdkLoaded.value;

  const cfg = getConfig();
  if (cfg && supabaseLoaded && window.supabase) {
    try {
      initSupabase(cfg.url, cfg.key);
      state.configured = true;
      render();
      await loadAll();
      state.ready = true;
      render();
    } catch(e) {
      console.error('Supabase init error:', e);
      useLocalMode();
    }
  } else if (!supabaseLoaded || !window.supabase) {
    // SDK failed to load — go straight to local mode
    console.warn('Supabase SDK not available, using local mode');
    useLocalMode();
  } else {
    render(); // shows setup screen
  }
})();
</script>
